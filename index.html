      {showWeeklyActivityModal && (
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.5)",display:"grid",placeItems:"center",padding:20,zIndex:104}} onClick={e=>e.target===e.currentTarget&&setShowWeeklyActivityModal(false)}>
          <div className="slide" style={{width:"min(980px,100%)",maxHeight:"90vh",overflow:"auto",background:"#fff",borderRadius:8,border:"1px solid #d7dfeb",boxShadow:"0 24px 60px rgba(0,0,0,.18)"}}>
            <div style={{borderTop:"3px solid #1e3a8a"}} />
            <div style={{padding:"18px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:16,borderBottom:"1px solid #e8eef6"}}>
              <div>
                <div className="condensed" style={{fontSize:22,fontWeight:800,color:"#172033"}}>Weekly Activity Log</div>
                <div className="mono" style={{fontSize:11,color:"#8ea0bd",marginTop:3}}>{filteredWeeklyActivities.length} matching activit{filteredWeeklyActivities.length===1?"y":"ies"} · {dashboardWeekStart} to {dashboardWeekEnd}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",justifyContent:"flex-end"}}>
                <select className="field mono" value={String(effectiveWeeklyWeekOffset)} onChange={e=>setWeeklyWeekOffset(parseInt(e.target.value,10) || 0)} style={{width:220,cursor:"pointer"}}>
                  {weeklyWeekOptions.map(option => <option key={option.offset} value={option.offset}>{option.label}</option>)}
                </select>
                <button onClick={()=>setShowWeeklyActivityModal(false)} style={{width:30,height:30,border:"1px solid #d7dfeb",borderRadius:4,background:"#fff",cursor:"pointer",color:"#94a3b8"}}>×</button>
              </div>
            </div>
            <div style={{padding:"18px 24px",display:"grid",gap:14}}>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {["All", ...ACTIVITY_TYPES].map(type => (
                  <button
                    key={type}
                    onClick={()=>setWeeklyActivityFilter(type)}
                    style={{padding:"7px 12px",borderRadius:999,border:"1px solid "+((weeklyActivityFilter===type ? ACTIVITY_COLORS[type] : "#d7dfeb")),background:weeklyActivityFilter===type ? ((ACTIVITY_COLORS[type] || "#64748b")+"12") : "#fff",color:weeklyActivityFilter===type ? (ACTIVITY_COLORS[type] || "#64748b") : "#64748b",cursor:"pointer",fontWeight:700,fontSize:12}}
                  >
                    {type} ({weeklyActivityStats.find(item => item.type===type)?.count || 0})
                  </button>
                ))}
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {weeklyOwnerStats.map(item => <Tag key={item.owner} label={`${item.owner}: ${item.count}`} color={PERSON_COLORS[item.owner] || "#64748b"} />)}
              </div>
              <div style={{background:"#fbfcfe",border:"1px solid #d7dfeb",borderRadius:6,overflow:"hidden"}}>
                {!filteredWeeklyActivities.length
                  ? <div className="mono" style={{padding:"18px 20px",fontSize:12,color:"#8ea0bd"}}>No activities logged for this filter during {dashboardWeekStart} to {dashboardWeekEnd}.</div>
                  : filteredWeeklyActivities.map(activity => {
                      const linkedRecord = resolveActivityRecord(activity);
                      const typeColor = ACTIVITY_COLORS[activity.type] || "#64748b";
                      return (
                        <div key={activity.id} style={{padding:"14px 16px",borderBottom:"1px solid #eef3f9",display:"grid",gap:8}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
                            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                              <Pill label={activity.type || "Note"} color={typeColor} />
                              <div className="mono" style={{fontSize:11,color:"#64748b"}}>{activity.date || "No date"}</div>
                              <OwnerTag owner={activity.created_by} />
                            </div>
                            {linkedRecord
                              ? <button onClick={()=>openWeeklyActivityRecord(activity)} style={{fontSize:12,color:"#1e3a8a",border:"none",background:"transparent",padding:0,cursor:"pointer",fontWeight:700,textDecoration:"underline",textAlign:"left"}}>{linkedRecord.company}</button>
                              : <div style={{fontSize:12,color:"#64748b",fontWeight:700}}>{activity.company || "Unknown company"}</div>}
                          </div>
                          <div style={{fontSize:13,color:"#334155",lineHeight:1.6,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{activity.note || "—"}</div>
                        </div>
                      );
                    })}
              </div>
            </div>
          </div>
        </div>
      )}

      {showTasksModal && (
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.5)",display:"grid",placeItems:"center",padding:20,zIndex:105}} onClick={e=>e.target===e.currentTarget&&setShowTasksModal(false)}>
          <div className="slide" style={{width:"min(900px,100%)",maxHeight:"90vh",overflow:"auto",background:"#fff",borderRadius:8,border:"1px solid #d7dfeb",boxShadow:"0 24px 60px rgba(0,0,0,.18)"}}>
            <div style={{borderTop:"3px solid #1e3a8a"}} />
            <div style={{padding:"18px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:16,borderBottom:"1px solid #e8eef6"}}>
              <div>
                <div className="condensed" style={{fontSize:22,fontWeight:800,color:"#172033"}}>All Tasks</div>
                <div className="mono" style={{fontSize:11,color:"#8ea0bd",marginTop:3}}>{filteredTaskList.length} matching task{filteredTaskList.length===1?"":"s"} · nearest due at the top</div>
              </div>
              <button onClick={()=>setShowTasksModal(false)} style={{width:30,height:30,border:"1px solid #d7dfeb",borderRadius:4,background:"#fff",cursor:"pointer",color:"#94a3b8"}}>×</button>
            </div>
            <div style={{padding:"18px 24px",display:"grid",gap:14}}>
              <div style={{display:"grid",gridTemplateColumns:"minmax(0,1fr) 140px",gap:10}}>
                <input className="field" value={taskSearch} onChange={e=>setTaskSearch(e.target.value)} placeholder="Search by company, task, or owner..." />
                <select className="field" value={allTasksOwnerFilter} onChange={e=>setAllTasksOwnerFilter(e.target.value)} style={{cursor:"pointer"}}>
                  <option value="All">All owners</option>
                  {PEOPLE.map(person => <option key={person} value={person}>{person}</option>)}
                </select>
              </div>
              <div style={{background:"#fbfcfe",border:"1px solid #d7dfeb",borderRadius:6,overflow:"hidden"}}>
                <div style={{display:"grid",gridTemplateColumns:"44px minmax(0,1fr) 170px 110px",gap:12,padding:"12px 16px",borderBottom:"1px solid #e8eef6",background:"#f8fbff"}}>
                  <div />
                  <div className="mono" style={{fontSize:10,color:"#8ea0bd",letterSpacing:".12em"}}>TASK</div>
                  <div className="mono" style={{fontSize:10,color:"#8ea0bd",letterSpacing:".12em"}}>COMPANY</div>
                  <div className="mono" style={{fontSize:10,color:"#8ea0bd",letterSpacing:".12em"}}>DUE DATE</div>
                </div>
                {!filteredTaskList.length && <div className="mono" style={{padding:"18px 20px",fontSize:12,color:"#8ea0bd"}}>No tasks match that search.</div>}
                {filteredTaskList.map(task=>{
                  const linkedRecord = resolveTaskRecord(task);
                  return (
                  <div key={task.id} style={{display:"grid",gridTemplateColumns:"44px minmax(0,1fr) 170px 110px",gap:12,alignItems:"start",padding:"12px 16px",borderBottom:"1px solid #eef3f9"}}>
                    <input type="checkbox" checked={task.done} onChange={()=>toggleTask(task.id)} style={{marginTop:2}} />
                    <div style={{minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:700,color:task.done?"#94a3b8":"#18233a",textDecoration:task.done?"line-through":"none"}}>{task.title}</div>
                      <div style={{marginTop:4}}><OwnerTag owner={task.owner} /></div>
                    </div>
                    {linkedRecord
                      ? <button onClick={()=>openTaskRecord(task)} style={{fontSize:12,color:"#1e3a8a",minWidth:0,wordBreak:"break-word",border:"none",background:"transparent",padding:0,textAlign:"left",cursor:"pointer",textDecoration:"underline"}}>{task.company || "—"}</button>
                      : <div style={{fontSize:12,color:"#475569",minWidth:0,wordBreak:"break-word"}}>{task.company || "—"}</div>}
                    <div className="mono" style={{fontSize:11,color:task.done?"#94a3b8":task.due_date&&task.due_date<today()?"#ef4444":"#64748b"}}>{task.due_date || "No date"}</div>
                  </div>
                )})}
              </div>
            </div>
          </div>
        </div>
      )}

      {showUnmatchedTasksModal && (
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.5)",display:"grid",placeItems:"center",padding:20,zIndex:106}} onClick={e=>e.target===e.currentTarget&&setShowUnmatchedTasksModal(false)}>
          <div className="slide" style={{width:"min(860px,100%)",maxHeight:"90vh",overflow:"auto",background:"#fff",borderRadius:8,border:"1px solid #d7dfeb",boxShadow:"0 24px 60px rgba(0,0,0,.18)"}}>
            <div style={{borderTop:"3px solid #ef4444"}} />
            <div style={{padding:"18px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:16,borderBottom:"1px solid #e8eef6"}}>
              <div>
                <div className="condensed" style={{fontSize:22,fontWeight:800,color:"#172033"}}>Unmatched Legacy Tasks</div>
                <div className="mono" style={{fontSize:11,color:"#8ea0bd",marginTop:3}}>{unmatchedLegacyTasks.length} task{unmatchedLegacyTasks.length===1?"":"s"} still stored only on this browser</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                {!!unmatchedLegacyTasks.length && <button onClick={attachUnmatchedLegacyTasks} style={{padding:"8px 12px",border:"1px solid #1e3a8a",borderRadius:4,background:"#eff6ff",color:"#1e3a8a",cursor:"pointer",fontSize:12,fontWeight:700}}>Attach Matched Now</button>}
                <button onClick={()=>setShowUnmatchedTasksModal(false)} style={{width:30,height:30,border:"1px solid #d7dfeb",borderRadius:4,background:"#fff",cursor:"pointer",color:"#94a3b8"}}>×</button>
              </div>
            </div>
            <div style={{padding:"18px 24px",display:"grid",gap:14}}>
              {!unmatchedLegacyTasks.length && <div className="mono" style={{fontSize:12,color:"#8ea0bd"}}>No unmatched legacy tasks right now.</div>}
              {!!unmatchedLegacyTasks.length && <div style={{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:6,padding:"12px 14px",fontSize:12,color:"#9a3412"}}>These tasks are not lost. They are still sitting in this browser because the app could not confidently match them to a live company record yet.</div>}
              {!!unmatchedLegacyTasks.length && <div style={{background:"#fbfcfe",border:"1px solid #d7dfeb",borderRadius:6,overflow:"hidden"}}>
                <div style={{display:"grid",gridTemplateColumns:"minmax(160px,220px) minmax(0,1fr) 110px 90px",gap:12,padding:"12px 16px",borderBottom:"1px solid #e8eef6",background:"#f8fbff"}}>
                  <div className="mono" style={{fontSize:10,color:"#8ea0bd",letterSpacing:".12em"}}>COMPANY</div>
                  <div className="mono" style={{fontSize:10,color:"#8ea0bd",letterSpacing:".12em"}}>TASK</div>
                  <div className="mono" style={{fontSize:10,color:"#8ea0bd",letterSpacing:".12em"}}>DUE DATE</div>
                  <div className="mono" style={{fontSize:10,color:"#8ea0bd",letterSpacing:".12em"}}>OWNER</div>
                </div>
                {unmatchedLegacyTasks.map((task, index)=>(
                  <div key={`${task.company || "unknown"}|${task.title || "task"}|${task.due_date || ""}|${index}`} style={{display:"grid",gridTemplateColumns:"minmax(160px,220px) minmax(0,1fr) 110px 90px",gap:12,padding:"12px 16px",borderBottom:"1px solid #eef3f9",alignItems:"start"}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#18233a",wordBreak:"break-word"}}>{task.company || "No company name saved"}</div>
                    <div style={{fontSize:12,color:"#475569",wordBreak:"break-word"}}>{task.title || "Untitled task"}</div>
                    <div className="mono" style={{fontSize:11,color:"#64748b"}}>{task.due_date || "No date"}</div>
                    <div><OwnerTag owner={task.owner} /></div>
                  </div>
                ))}
              </div>}
            </div>
          </div>
        </div>
      )}

      {showForm && (
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.5)",display:"grid",placeItems:"center",padding:20,zIndex:110}} onClick={e=>e.target===e.currentTarget&&setShowForm(false)}>
          <div className="slide" style={{width:"min(620px,100%)",background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,overflow:"hidden"}}>
            <div style={{borderTop:"3px solid "+TYPE_CFG[formType].color}} />
            <div style={{padding:"18px 24px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div className="condensed" style={{fontSize:20,fontWeight:800}}>{form.id?"Edit":"New"} {formType==="manufacturer"?"Company":formType==="vendor"?"Vendor":"Lost Contact"}</div>
              <button onClick={()=>setShowForm(false)} style={{width:30,height:30,border:"1px solid #e2e8f0",borderRadius:4,background:"#fff",cursor:"pointer"}}>×</button>
            </div>
            <div style={{padding:24,display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              <input className="field" style={{gridColumn:"1 / -1"}} placeholder="Company" value={form.company||""} onChange={e=>setForm(cur=>({...cur,company:e.target.value}))} />
              {formType==="manufacturer" ? <>
                <select className="field" value={form.stage||"Prospect"} onChange={e=>setForm(cur=>({...cur,stage:e.target.value}))}>{STAGES.map(s=><option key={s}>{s}</option>)}</select>
                <select className="field" value={form.industry||""} onChange={e=>setForm(cur=>({...cur,industry:e.target.value}))}><option value="">{OTHER_INDUSTRY_LABEL}</option>{INDUSTRIES.map(i=><option key={i}>{i}</option>)}</select>
                <textarea className="fieldbox" style={{gridColumn:"1 / -1",minHeight:110}} placeholder="Contacts: Name, Title, LinkedIn" value={form.contactsText||""} onChange={e=>setForm(cur=>({...cur,contactsText:e.target.value}))} />
              </> : <>
                {["name","title","email","phone","industry","region"].map(k=><input key={k} className="field" placeholder={k[0].toUpperCase()+k.slice(1)} value={form[k]||""} onChange={e=>setForm(cur=>({...cur,[k]:e.target.value}))} />)}
                {formType==="vendor" && <select className="field" value={form.stage||"Prospect"} onChange={e=>setForm(cur=>({...cur,stage:e.target.value}))}>{STAGES.map(s=><option key={s}>{s}</option>)}</select>}
                {formType==="lost" && <>
                  <select className="field" value={form.lostReason||""} onChange={e=>setForm(cur=>({...cur,lostReason:e.target.value}))}><option value="">Loss reason</option>{LOST_REASONS.map(r=><option key={r}>{r}</option>)}</select>
                  <input className="field" type="number" placeholder="Deal value" value={form.value||""} onChange={e=>setForm(cur=>({...cur,value:e.target.value}))} />
                </>}
              </>}
              <textarea className="fieldbox" style={{gridColumn:"1 / -1"}} placeholder="Notes" value={form.notes||""} onChange={e=>setForm(cur=>({...cur,notes:e.target.value}))} />
              <div style={{gridColumn:"1 / -1",display:"flex",justifyContent:"flex-end",gap:10}}>
                <button onClick={()=>setShowForm(false)} style={{padding:"8px 14px",border:"none",borderRadius:4,background:"#f1f5f9",color:"#64748b",cursor:"pointer"}}>Cancel</button>
                <button onClick={saveForm} style={{padding:"8px 14px",border:"none",borderRadius:4,background:"#ef4444",color:"#fff",cursor:"pointer"}}>{saving?"Saving...":(form.id?"Save Changes":"Add")}</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {importRows && (
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.5)",display:"grid",placeItems:"center",padding:20,zIndex:115}} onClick={e=>e.target===e.currentTarget&&setImportRows(null)}>
          <div className="slide" style={{width:"min(760px,100%)",background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,overflow:"hidden"}}>
            <div style={{borderTop:"3px solid #22c55e"}} />
            <div style={{padding:"18px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #e2e8f0"}}>
              <div>
                <div className="condensed" style={{fontSize:20,fontWeight:800}}>Import Preview</div>
                <div className="mono" style={{fontSize:11,color:"#64748b"}}>{validImportRows.length} valid rows · {importUniqueRows.length} unique companies · {importSkipCount} skipped</div>
              </div>
              <button onClick={()=>setImportRows(null)} style={{width:30,height:30,border:"1px solid #e2e8f0",borderRadius:4,background:"#fff",cursor:"pointer"}}>×</button>
            </div>
            <div style={{padding:"14px 24px",borderBottom:"1px solid #e2e8f0",display:"grid",gap:12,background:"#fbfdff"}}>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <button onClick={()=>setImportMode("merge")} style={{padding:"8px 12px",borderRadius:4,border:"1px solid "+(importMode==="merge"?"#1e3a8a":"#d7dfeb"),background:importMode==="merge"?"#eef4ff":"#fff",color:importMode==="merge"?"#1e3a8a":"#64748b",cursor:"pointer",fontWeight:700}}>Add / Update Only</button>
                <button onClick={()=>setImportMode("replace")} style={{padding:"8px 12px",borderRadius:4,border:"1px solid "+(importMode==="replace"?"#ef4444":"#d7dfeb"),background:importMode==="replace"?"#fef2f2":"#fff",color:importMode==="replace"?"#ef4444":"#64748b",cursor:"pointer",fontWeight:700}}>Replace Manufacturers from CSV</button>
              </div>
              <div className="mono" style={{fontSize:11,color:"#64748b",display:"flex",gap:14,flexWrap:"wrap"}}>
                <span>ADD: {importAddCount}</span>
                <span>UPDATE: {importUpdateCount}</span>
                {importMode==="replace" && <span style={{color:"#ef4444"}}>DELETE: {importDeleteCount}</span>}
              </div>
              <div style={{fontSize:12,color:"#64748b"}}>Manufacturers are created only from the CSV <span className="mono">company</span> column. Contact names, LinkedIn lines, and notes stay attached to that same company row.</div>
              {importMode==="replace" && <div style={{fontSize:12,color:"#ef4444"}}>Replace mode makes the `manufacturers` table match this CSV. Manufacturers not in the file, plus duplicate manufacturer rows, will be deleted along with their linked contacts and activities.</div>}
            </div>
            <div style={{maxHeight:"50vh",overflow:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr style={{background:"#f8fafc"}}>{["Company","Industry","Stage","Status"].map(h=><th key={h} className="mono" style={{padding:"10px 14px",fontSize:10,color:"#94a3b8",textAlign:"left",letterSpacing:".08em",borderBottom:"2px solid #e2e8f0"}}>{h}</th>)}</tr></thead><tbody>{importPreviewRows.map((r,i)=>{const ok=isLikelyCompanyName(r.company); return <tr key={i}><td style={{padding:"10px 14px",borderBottom:"1px solid #f1f5f9",color:ok?"#0f172a":"#ef4444",fontWeight:600}}>{r.company||"SKIPPED"}</td><td style={{padding:"10px 14px",borderBottom:"1px solid #f1f5f9"}}>{r.industry||"—"}</td><td style={{padding:"10px 14px",borderBottom:"1px solid #f1f5f9"}}>{normalizeStage(r.stage)}</td><td style={{padding:"10px 14px",borderBottom:"1px solid #f1f5f9"}}><Tag label={ok?"READY":"SKIP"} color={ok?"#22c55e":"#ef4444"} /></td></tr>;})}</tbody></table>
            </div>
            <div style={{padding:"14px 24px",display:"flex",justifyContent:"flex-end",gap:10,borderTop:"1px solid #e2e8f0"}}>
              <button onClick={()=>setImportRows(null)} style={{padding:"8px 14px",border:"none",borderRadius:4,background:"#f1f5f9",color:"#64748b",cursor:"pointer"}}>Cancel</button>
              <button onClick={commitImport} style={{padding:"8px 14px",border:"none",borderRadius:4,background:importMode==="replace"?"#ef4444":"#22c55e",color:"#fff",cursor:"pointer"}}>{importMode==="replace"?"Confirm Replace":"Confirm Import"}</button>
            </div>
          </div>
        </div>
      )}

      <div style={{position:"fixed",right:24,bottom:24,zIndex:140,display:"grid",gap:8,justifyItems:"end"}}>
        {showEmailFmt && (
          <div className="slide" style={{width:300,background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,padding:16,boxShadow:"0 8px 30px rgba(0,0,0,.15)"}}>
            <div className="mono" style={{fontSize:11,color:"#16a34a",letterSpacing:".08em",marginBottom:10}}>EMAIL FORMATTER</div>
            <input className="field" style={{marginBottom:8}} placeholder="John Smith" value={efName} onChange={e=>setEfName(e.target.value)} />
            <input className="field" style={{marginBottom:8}} placeholder="company.com" value={efDomain} onChange={e=>setEfDomain(e.target.value)} />
            <select className="field" value={efFmt} onChange={e=>setEfFmt(e.target.value)}><option value="{first}.{last}">{"{first}.{last}"}</option><option value="{first}{last}">{"{first}{last}"}</option><option value="{first}">{"{first}"}</option><option value="{f}{last}">{"{f}{last}"}</option><option value="{f}.{last}">{"{f}.{last}"}</option><option value="{first}_{last}">{"{first}_{last}"}</option><option value="{last}.{first}">{"{last}.{first}"}</option></select>
            {efName&&efDomain && <div style={{marginTop:10,padding:"8px 10px",borderRadius:4,background:"#f0fdf4",border:"1px solid #bbf7d0",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}><span className="mono" style={{fontSize:12,color:"#15803d"}}>{fmtEmail(efName,efDomain,efFmt)}</span><button onClick={()=>{navigator.clipboard.writeText(fmtEmail(efName,efDomain,efFmt)); toast2("Copied");}} style={{padding:"4px 8px",border:"1px solid #bbf7d0",borderRadius:4,background:"#fff",cursor:"pointer"}}>Copy</button></div>}
          </div>
        )}
        <button onClick={()=>setShowEmailFmt(v=>!v)} style={{width:46,height:46,border:"none",borderRadius:999,background:showEmailFmt?"#16a34a":"#1e3a8a",color:"#fff",fontSize:18,cursor:"pointer",boxShadow:"0 4px 14px rgba(0,0,0,.2)"}}>✉</button>
      </div>

      {toast && <div style={{position:"fixed",left:"50%",bottom:24,transform:"translateX(-50%)",background:"#0f172a",color:"#f8fafc",padding:"10px 20px",borderRadius:6,boxShadow:"0 4px 20px rgba(0,0,0,.25)",zIndex:120}}>{toast}</div>}
      {saving && <div className="mono" style={{position:"fixed",right:24,bottom:24,background:"#1e3a8a",color:"#fff",padding:"8px 14px",borderRadius:6,zIndex:121}}>Saving...</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
