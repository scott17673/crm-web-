const splitCsv = line => { const out=[]; let cur="",q=false; for(let i=0;i<line.length;i++){ const ch=line[i]; if(ch=='"'&&!q){q=true;continue;} if(ch=='"'&&q&&line[i+1]=='"'){cur+='"';i++;continue;} if(ch=='"'&&q){q=false;continue;} if(ch===","&&!q){out.push(cur);cur="";continue;} cur+=ch; } out.push(cur); return out; };
const normalizeCsvHeader = value => String(value || "").trim().toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"");
const parseCsv = text => {
  const rows = [];
  let row = [];
  let cur = "";
  let inQuotes = false;
  const input = String(text || "");
  for(let i=0;i<input.length;i++){
    const ch = input[i];
    if(ch === '"'){
      if(inQuotes && input[i+1] === '"'){
        cur += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
      continue;
    }
    if(ch === ',' && !inQuotes){
      row.push(cur);
      cur = "";
      continue;
    }
    if((ch === '\n' || ch === '\r') && !inQuotes){
      if(ch === '\r' && input[i+1] === '\n') i++;
      row.push(cur);
      if(row.some(value => String(value).trim() !== "")) rows.push(row);
      row = [];
      cur = "";
      continue;
    }
    cur += ch;
  }
  row.push(cur);
  if(row.some(value => String(value).trim() !== "")) rows.push(row);
  if(rows.length < 2) return [];
  const headers = rows[0].map(normalizeCsvHeader);
  return rows.slice(1).map(values => {
    const record = {};
    headers.forEach((header, index) => { record[header] = (values[index] || "").trim(); });
    return record;
  });
};
const csvValue = v => { const s=String(v ?? ""); return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s; };
const downloadCsv = (rows, name) => { if(!rows.length) return; const keys=Object.keys(rows[0]); const lines=[keys.join(","),...rows.map(row=>keys.map(k=>csvValue(row[k])).join(","))]; const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([lines.join("\n")],{type:"text/csv"})); a.download=name; a.click(); };

  const text = String(raw || "").replace(/\s+/g," ").trim();
  if(!text) return false;

  if(looksLikeBogusImportCompany(text)) return false;
  if(/https?:\/\//i.test(text) || /\blinkedin\b/i.test(text)) return false;
  if(/^\(\d{4}[\/-]\d{2}[\/-]\d{2}\)/.test(text)) return false;
  if(text.includes("|")) return false;
  if(/\b(blvd|boulevard|parkway|pkwy|road|rd|street|st|avenue|ave|drive|dr|suite|unit)\b/i.test(text) && /\d/.test(text)) return false;
  if(/^(common plant problems|maintenance \/ operations leadership|recent signals|fabrication|machines|equipment|cookers|address|phone)\b/i.test(text.toLowerCase())) return false;
  if(/^(based on|i did not|i could not|unlike|have no)\b/i.test(text)) return false;

};

const dedupeContacts = contacts => {
  const seen = new Set();
  return contacts.filter(contact => {
    const name = String(contact?.name || "").trim();
    const title = String(contact?.title || "").trim();
    const linkedin = String(contact?.linkedin || "").trim();
    if(!name) return false;
    const key = [name.toLowerCase(), title.toLowerCase(), linkedin.toLowerCase()].join("|");
    if(seen.has(key)) return false;
    seen.add(key);
    return true;
  }).map(contact => ({
    name: String(contact.name || "").trim(),
    title: String(contact.title || "").trim(),
    linkedin: String(contact.linkedin || "").trim(),
  }));
};
const parseLinkedinContactLine = line => {
  const linkedin = extractLinkedinUrl(line);
  if(!linkedin && !/\blinkedin\b/i.test(String(line || ""))) return null;
  const cleaned = String(line || "")
    .replace(/https?:\/\/[^\s|,]+/ig, "")
    .replace(/\bLinkedIn\b/ig, "")
    .replace(/\u00e2\u20ac\u201c|\u00e2\u20ac\u201d|[\u2012-\u2015]/g, " - ")
    .replace(/\s+/g, " ")
    .trim();
  const primaryBlock = cleaned.split(/\s*\|\s*/)[0].trim();
  const dash = primaryBlock.match(/^(.*?)\s+-\s+(.*)$/);
  if(!dash) return null;
  const name = dash[1].trim().replace(/^[,;:\-\s]+|[,;:\-\s]+$/g, "");
  const title = dash[2].trim().replace(/^[,;:\-\s]+|[,;:\-\s]+$/g, "");
  if(!looksLikePersonName(name) || looksLikeResearchNoise(name)) return null;
  return { name, title, linkedin };
};
const parseStructuredContactsField = raw => dedupeContacts(
  String(raw || "")
    .split(/(?:;;|\r?\n)+/)
    .flatMap(entry => {
      const linkedin = extractLinkedinUrl(entry);
      const cleaned = entry
        .replace(/https?:\/\/[^\s|,]+/ig, "")
        .replace(/\bLinkedIn\b/ig, "")
        .replace(/[–—]/g, " - ")
        .trim()
        .replace(/^[|,\s]+|[|,\s]+$/g, "");
      const blocks = (cleaned.includes("|") ? cleaned.split(/\s*\|\s*/) : [cleaned])
        .flatMap(part => part.split(/,\s*(?=[A-Z][a-z]+(?:\s+[A-Z][a-z]+)+\s+-)/))
        .map(part => part.trim())
        .filter(Boolean);
      return blocks.map(part => {
        const dash = part.match(/^(.*?)\s+-\s+(.*)$/);
        return {
          name: dash ? dash[1] : part,
          title: dash ? dash[2] : "",
          linkedin,
        };
      });
    })
    .filter(contact => contact.name && !looksLikeResearchNoise(contact.name) && !/^https?:\/\//i.test(contact.name))
);
const extractContactsFromNotes = notes => {
  const matches = [...String(notes || "").matchAll(/RE contact:\s*([^;]+)/gi)].map(match => match[1].trim()).filter(Boolean);

      .map(piece => piece.trim())

        if(dash){

  if(!left) return right;
  if(!right) return left;

  return `${left}${separator}${right}`;
};
const normalizeImportDate = raw => {
  const text = String(raw || "").trim();
  if(!text) return "";
  if(/^\d{4}-\d{2}-\d{2}$/.test(text)) return text;
  const parts = text.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);

  const day = parts[2].padStart(2, "0");

  return `${year}-${month}-${day}`;
};

  const parsed = {name:"",title:"",email:"",phone:"",industry:"",region:""};
  String(raw || "").split(/\r?\n/).map(line => line.trim()).filter(Boolean).forEach(line => {

    const key = [row.contact_type || "", row.contact_id || "", row.company || "", row.title || "", row.due_date || ""].join("|");
    if(seen.has(key)) return false;
    seen.add(key);
    return true;
  });
};

const EXTERNAL_LINK_RE = /((?:https?:\/\/|www\.|(?:[a-z0-9-]+\.)+[a-z]{2,}\/)[^\s<]+)/gi;
const isExternalLinkText = value => /^(?:https?:\/\/|www\.|(?:[a-z0-9-]+\.)+[a-z]{2,}\/)[^\s<]*$/i.test(String(value || "").trim());
const normalizeExternalUrl = value => {
  const raw = String(value || "").trim();
  if(!raw) return "";
  if(/^https?:\/\//i.test(raw)) return raw;
  return "https://" + raw.replace(/^\/+/, "");
};
const escapeHtml = value => String(value || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const linkifiedHtml = text => String(text || "").split(EXTERNAL_LINK_RE).map(part => isExternalLinkText(part)
  ? `<span data-external-url="${escapeHtml(normalizeExternalUrl(part))}" style="color:#1d4ed8;text-decoration:underline;word-break:break-all;cursor:pointer;">${escapeHtml(part)}</span>`
  : escapeHtml(part)
).join("");
const editableTextFromElement = element => String(element?.innerText || "").replace(/\u00A0/g," ").replace(/\r/g,"").replace(/\n$/, "");
const cleanupRichNotesHtml = html => String(html || "")
  .replace(/(?:\s*<br>\s*){3,}/gi, "<br><br>")
  .replace(/^(?:\s*<br>\s*)+|(?:\s*<br>\s*)+$/gi, "");
const richNotesFromPlainText = text => cleanupRichNotesHtml(escapeHtml(String(text || "")).replace(/\r?\n/g, "<br>"));
const isBoldRichNode = node => {
  if(!node || node.nodeType!==1) return false;
  const tag = node.tagName.toLowerCase();
  if(tag==="strong" || tag==="b") return true;
  const fontWeight = String(node.style?.fontWeight || "").toLowerCase();
  return fontWeight==="bold" || fontWeight==="bolder" || Number.parseInt(fontWeight, 10) >= 600;
};
const richNotesPlainText = raw => {
  const template = document.createElement("template");
  template.innerHTML = String(raw || "");
  const walk = nodes => Array.from(nodes || []).map(node => {
    if(node.nodeType===3) return node.textContent || "";
    if(node.nodeType!==1) return "";
    const tag = node.tagName.toLowerCase();
    if(tag==="br") return "\n";
    const inner = walk(node.childNodes);
    if(["div","p","li"].includes(tag)) return `${inner}\n`;
    return inner;
  }).join("");
  return walk(template.content.childNodes).replace(/\u00A0/g, " ").replace(/\r/g, "").replace(/\n{3,}/g, "\n\n").trim();
};
const serializeRichNotesNode = node => {
  if(node.nodeType===3) return escapeHtml(node.textContent || "");
  if(node.nodeType!==1) return "";
  const tag = node.tagName.toLowerCase();
  if(tag==="br") return "<br>";
  if(tag==="a"){
    const text = (node.textContent || "").trim();
    const href = String(node.getAttribute("href") || "").trim();
    const combined = text
      ? (href && !text.includes(href) && !isExternalLinkText(text) ? `${text} ${href}` : text)
      : href;
    return richNotesFromPlainText(combined);
  }
  const inner = Array.from(node.childNodes || []).map(serializeRichNotesNode).join("");
  if(isBoldRichNode(node)) return inner ? `<strong>${inner}</strong>` : "";
  if(["div","p","li"].includes(tag)) return `${inner}<br>`;
  return inner;
};
const richNotesFromHtml = rawHtml => {
  const template = document.createElement("template");
  template.innerHTML = String(rawHtml || "");
  return cleanupRichNotesHtml(Array.from(template.content.childNodes || []).map(serializeRichNotesNode).join(""));
};
const richNotesFromElement = element => richNotesFromHtml(element?.innerHTML || "");
const renderRichNotesHtml = raw => {
  const template = document.createElement("template");
  template.innerHTML = String(raw || "");
  const walk = nodes => Array.from(nodes || []).map(node => {
    if(node.nodeType===3) return linkifiedHtml(node.textContent || "");
    if(node.nodeType!==1) return "";
    const tag = node.tagName.toLowerCase();
    if(tag==="br") return "<br>";
    if(isBoldRichNode(node)){
      const inner = walk(node.childNodes);
      return inner ? `<strong>${inner}</strong>` : "";
    }
    if(tag==="a"){
      const text = (node.textContent || "").trim();
      const href = normalizeExternalUrl(node.getAttribute("href") || text);
      const label = text || href;
      return label ? `<span data-external-url="${escapeHtml(href)}" style="color:#1d4ed8;text-decoration:underline;word-break:break-all;cursor:pointer;">${escapeHtml(label)}</span>` : "";
    }
    const inner = walk(node.childNodes);
    if(["div","p","li"].includes(tag)) return `${inner}<br>`;
    return inner;
  }).join("");
  return cleanupRichNotesHtml(walk(template.content.childNodes));
};
const insertHtmlAtSelection = html => {
  if(document.queryCommandSupported?.("insertHTML")){
    document.execCommand("insertHTML", false, html);
    return;
  }
  const selection = window.getSelection();
  if(!selection?.rangeCount) return;
  const range = selection.getRangeAt(0);
  range.deleteContents();
  const fragment = range.createContextualFragment(html);
  const lastNode = fragment.lastChild;
  range.insertNode(fragment);
  if(lastNode){
    range.setStartAfter(lastNode);
    range.collapse(true);
    selection.removeAllRanges();
    selection.addRange(range);
  }
};
const clickedExternalUrl = (event, root) => {
  const node = event.target && (event.target.nodeType === 1 ? event.target : event.target.parentElement);
  const tagged = node?.closest?.("[data-external-url]");
  if(tagged) return tagged.getAttribute("data-external-url") || "";
  return "";
};
const LinkifiedText = ({ text, style }) => {
  const parts = String(text || "").split(EXTERNAL_LINK_RE);
  return (
    <div style={{whiteSpace:"pre-wrap",wordBreak:"break-word",...style}}>
      {parts.map((part, index) => isExternalLinkText(part)
        ? <a key={index} href={normalizeExternalUrl(part)} target="_blank" rel="noreferrer" onMouseDown={e=>e.stopPropagation()} onPointerDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()} style={{color:"#1d4ed8",textDecoration:"underline",wordBreak:"break-all",cursor:"pointer"}}>{part}</a>
        : <React.Fragment key={index}>{part}</React.Fragment>
      )}
    </div>
  );
};

const EditableLinkField = React.forwardRef(({ value, onChange, onBlurSave, onMeasure, placeholder, height, style, richText=false }, forwardedRef) => {
  const innerRef = useRef(null);

  useEffect(()=>{
    const element = innerRef.current;
    if(!element || document.activeElement===element) return;
    const html = richText ? renderRichNotesHtml(value) : linkifiedHtml(value);
    if(element.innerHTML !== html) element.innerHTML = html;
  },[value, richText]);

  useEffect(()=>{
    if(typeof forwardedRef === "function") forwardedRef(innerRef.current);
    else if(forwardedRef) forwardedRef.current = innerRef.current;
  },[forwardedRef]);

  return (
    <div
      ref={innerRef}
      className="editablebox"
      contentEditable
      suppressContentEditableWarning
      data-placeholder={placeholder}
      style={{height,minHeight:height,border:"1px solid #eef2f7",background:"#fff",...style}}
      onInput={e=>{ onChange(richText ? richNotesFromElement(e.currentTarget) : editableTextFromElement(e.currentTarget)); onMeasure?.(); }}
      onPaste={e=>{
        e.preventDefault();
        const html = richText
          ? renderRichNotesHtml(
              e.clipboardData?.getData("text/html")
                ? richNotesFromHtml(e.clipboardData.getData("text/html"))
                : richNotesFromPlainText(e.clipboardData?.getData("text/plain") || "")
            )
          : linkifiedHtml(e.clipboardData?.getData("text/plain") || "").replace(/\r?\n/g, "<br>");
        insertHtmlAtSelection(html);
        window.requestAnimationFrame(()=>{
          const nextValue = richText ? richNotesFromElement(innerRef.current) : editableTextFromElement(innerRef.current);
          onChange(nextValue);
          onMeasure?.();
        });
      }}
      onBlur={e=>{
        const nextValue = richText ? richNotesFromElement(e.currentTarget) : editableTextFromElement(e.currentTarget);
        e.currentTarget.innerHTML = richText ? renderRichNotesHtml(nextValue) : linkifiedHtml(nextValue);
        onMeasure?.();
        onBlurSave?.(nextValue);
      }}
      onPointerDown={e=>{
        const url = clickedExternalUrl(e, innerRef.current);
        if(!url) return;
        e.preventDefault();
        e.stopPropagation();
        window.open(url, "_blank", "noopener,noreferrer");
      }}
      onClick={e=>{
        const url = clickedExternalUrl(e, innerRef.current);
        if(!url) return;
        e.preventDefault();
        e.stopPropagation();
      }}
    />
  );
});

  const commitImport = async () => {

      const existingByKey = new Map();
      for(const record of mfrs){
        const key = normalizeCompanyKey(record.company);
        if(!key) continue;
        if(!existingByKey.has(key)) existingByKey.set(key, []);
        existingByKey.get(key).push(record);
      }

      const manufacturerIdsToDelete = [];

      for(const [key, row] of incomingByKey.entries()){
        const importStage = normalizeStage(row.stage);
        const importContacts = row.importedContacts || [];
        const payload={
          company: row.company,
          stage: importStage,
          industry: row.industry || "",
          end_product: row.end_product || "",
          signals: row.notes,
          tags: row.tags || [],
          last_contact: normalizeImportDate(row.date) || today()
        };
        const existingMatches = existingByKey.get(key) || [];
        const keepRecord = existingMatches.find(record => String(record.company || "").trim().toLowerCase()===String(row.company || "").trim().toLowerCase()) || existingMatches[0];

        if(keepRecord){
          ensureOk(await sb.from("manufacturers").update(payload).eq("id",keepRecord.id));

          ensureOk(insertedResult);
          if(insertedResult.data?.id && importContacts.length) await replaceManufacturerContacts(insertedResult.data.id, importContacts);

        for(const [key, records] of existingByKey.entries()){
          if(!incomingByKey.has(key)) manufacturerIdsToDelete.push(...records.map(record => record.id));

                  <div className="mono" style={{fontSize:10,color:"#8ea0bd",letterSpacing:".12em",marginBottom:10}}>TASKS</div>
                  <div style={{display:"grid",gridTemplateColumns:"minmax(0,1fr) 130px 70px",gap:8,marginBottom:10}}>
                    <input className="field" value={taskTitle} onChange={e=>{ const value = e.target.value; setTaskTitle(value); syncTaskDraft(selected,{title:value}); }} placeholder="Add a task..." style={{background:"#fbfcfe"}} />
                    <input className="field mono" style={{background:"#fff"}} type="date" value={taskDate} onChange={e=>{ const value = e.target.value; setTaskDate(value); syncTaskDraft(selected,{due_date:value}); }} />
                    <button onClick={addTask} style={{padding:"8px 14px",border:"none",borderRadius:4,background:"#ef4444",color:"#fff",cursor:"pointer",fontWeight:800,fontSize:12,letterSpacing:".05em"}}>ADD</button>
                  </div>
                  {tasks.filter(t=>taskMatchesRecord(t, selected)).length===0 && <div className="mono" style={{fontSize:11,color:"#8ea0bd"}}>No tasks yet.</div>}
                  {tasks.filter(t=>taskMatchesRecord(t, selected)).map(t=>(
                    <div key={t.id} style={{display:"flex",gap:8,alignItems:"center",padding:"8px 0",borderBottom:"1px solid #f1f5f9"}}>
                      <input type="checkbox" checked={t.done} onChange={()=>toggleTask(t.id)} onClick={e=>e.stopPropagation()} />
                      <div
                        style={{flex:1}}
                        onClick={()=>startTaskEdit(t)}
                        onBlur={e=>{ if(editingTaskId===t.id && !e.currentTarget.contains(e.relatedTarget)) saveTaskEdit(t.id); }}
                      >
                        {editingTaskId===t.id
                          ? <div style={{display:"grid",gridTemplateColumns:"minmax(0,1fr) 130px",gap:8}}>
                              <input className="field" autoFocus value={editingTaskDraft.title} onChange={e=>setEditingTaskDraft(cur=>({...cur,title:e.target.value}))} onKeyDown={e=>{ if(e.key==="Enter") saveTaskEdit(t.id); if(e.key==="Escape"){ setEditingTaskId(null); setEditingTaskDraft({title:"",due_date:""}); } }} />
                              <input className="field mono" type="date" value={editingTaskDraft.due_date} onChange={e=>setEditingTaskDraft(cur=>({...cur,due_date:e.target.value}))} onKeyDown={e=>{ if(e.key==="Escape"){ setEditingTaskId(null); setEditingTaskDraft({title:"",due_date:""}); } }} />
                            </div>
                          : <div>
                              <div style={{fontSize:13,textDecoration:t.done?"line-through":"none",color:t.done?"#94a3b8":"#0f172a",cursor:"text"}}>{t.title}</div>
                              {t.due_date&&<div className="mono" style={{fontSize:10,color:t.due_date<today()&&!t.done?"#ef4444":"#94a3b8"}}>{t.due_date}</div>}
                            </div>}
                      </div>
                      <button onClick={e=>{ e.stopPropagation(); deleteTask(t.id); }} style={{border:"none",background:"transparent",color:"#cbd5e1",fontSize:16,cursor:"pointer"}}>×</button>
                    </div>
                  ))}
                </div>
                <div style={{paddingTop:18,borderTop:"1px solid #e8eef6"}}>
                  <div className="mono" style={{fontSize:10,color:"#8ea0bd",letterSpacing:".12em",marginBottom:10}}>LOG ACTIVITY</div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>{["Call","Email","Meeting","Note"].map(t=><button key={t} onClick={()=>{ const next = {...newAct,type:t}; setNewAct(next); syncActivityDraft(selected,next); }} style={{padding:"6px 14px",borderRadius:3,border:"2px solid "+(newAct.type===t?"#1e3a8a":"#d7dfeb"),background:newAct.type===t?"#eef4ff":"#fff",color:newAct.type===t?"#1e3a8a":"#8ea0bd",cursor:"pointer",fontWeight:800,fontSize:12,letterSpacing:".05em"}}>{t.toUpperCase()}</button>)}</div>
                  <div style={{display:"grid",gridTemplateColumns:"minmax(0,1fr) 136px 64px",gap:8,marginBottom:10}}>
                    <input className="field" value={newAct.note} onChange={e=>{ const next = {...newAct,note:e.target.value}; setNewAct(next); syncActivityDraft(selected,next); }} placeholder="Add a note..." style={{background:"#fbfcfe"}} onKeyDown={e=>e.key==="Enter"&&logActivity()} />
                    <input className="field mono" type="date" value={newAct.date} onChange={e=>{ const next = {...newAct,date:e.target.value}; setNewAct(next); syncActivityDraft(selected,next); }} />
                    <button onClick={logActivity} style={{padding:"8px 14px",border:"none",borderRadius:4,background:"#ef4444",color:"#fff",cursor:"pointer",fontWeight:800,fontSize:12,letterSpacing:".05em"}}>LOG</button>
                  </div>
                  {!detailActs.length && <div className="mono" style={{fontSize:11,color:"#8ea0bd"}}>No activity yet.</div>}
                  {detailActs.map(a=>(
                    <div
                      key={a.id}
                      style={{padding:"10px 0",borderBottom:"1px solid #f1f5f9"}}
                      onBlur={e=>{ if(editingActId===a.id && !e.currentTarget.contains(e.relatedTarget)) saveActivityEdit(a.id); }}
                    >
                      {editingActId===a.id
                        ? <div style={{display:"grid",gap:8}}>
                            <div style={{display:"grid",gridTemplateColumns:"150px minmax(0,1fr)",gap:8,alignItems:"center"}}>
                              <select className="field mono" value={editingActDraft.type} onChange={e=>setEditingActDraft(cur=>({...cur,type:e.target.value}))}>
                                {["Call","Email","Meeting","Note"].map(type=><option key={type}>{type}</option>)}
                              </select>
                              <div className="mono" style={{fontSize:10,color:"#94a3b8"}}>{a.date}</div>
                            </div>
                            <textarea className="fieldbox" autoFocus style={{minHeight:82,resize:"vertical"}} value={editingActDraft.note} onChange={e=>setEditingActDraft(cur=>({...cur,note:e.target.value}))} onKeyDown={e=>{ if(e.key==="Escape"){ setEditingActId(null); setEditingActDraft({type:"Call",note:""}); } if((e.ctrlKey||e.metaKey)&&e.key==="Enter") saveActivityEdit(a.id); }} />
                          </div>
                        : <div onClick={e=>{ if(isLinkTarget(e.target)) return; startActivityEdit(a); }} style={{cursor:"text"}}>
                            <div style={{fontSize:12}}><span className="condensed" style={{fontWeight:700,color:"#1e3a8a",textTransform:"uppercase"}}>{a.type}</span><span style={{color:"#cbd5e1"}}> · </span><span className="mono" style={{fontSize:10,color:"#94a3b8"}}>{a.date}</span></div>
                            <LinkifiedText text={a.note} style={{fontSize:13,color:"#475569",lineHeight:1.6}} />
                          </div>}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {showTasksModal && (
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.5)",display:"grid",placeItems:"center",padding:20,zIndex:105}} onClick={e=>e.target===e.currentTarget&&setShowTasksModal(false)}>
          <div className="slide" style={{width:"min(900px,100%)",maxHeight:"90vh",overflow:"auto",background:"#fff",borderRadius:8,border:"1px solid #d7dfeb",boxShadow:"0 24px 60px rgba(0,0,0,.18)"}}>
            <div style={{borderTop:"3px solid #1e3a8a"}} />
            <div style={{padding:"18px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:16,borderBottom:"1px solid #e8eef6"}}>
              <div>
                <div className="condensed" style={{fontSize:22,fontWeight:800,color:"#172033"}}>All Tasks</div>
                <div className="mono" style={{fontSize:11,color:"#8ea0bd",marginTop:3}}>{filteredTaskList.length} matching task{filteredTaskList.length===1?"":"s"} · nearest due at the top</div>
              </div>
              <button onClick={()=>setShowTasksModal(false)} style={{width:30,height:30,border:"1px solid #d7dfeb",borderRadius:4,background:"#fff",cursor:"pointer",color:"#94a3b8"}}>×</button>
            </div>
            <div style={{padding:"18px 24px",display:"grid",gap:14}}>
              <input className="field" value={taskSearch} onChange={e=>setTaskSearch(e.target.value)} placeholder="Search by company or task..." />
              <div style={{background:"#fbfcfe",border:"1px solid #d7dfeb",borderRadius:6,overflow:"hidden"}}>
                <div style={{display:"grid",gridTemplateColumns:"44px minmax(0,1fr) 170px 110px",gap:12,padding:"12px 16px",borderBottom:"1px solid #e8eef6",background:"#f8fbff"}}>
                  <div />
                  <div className="mono" style={{fontSize:10,color:"#8ea0bd",letterSpacing:".12em"}}>TASK</div>
                  <div className="mono" style={{fontSize:10,color:"#8ea0bd",letterSpacing:".12em"}}>COMPANY</div>
                  <div className="mono" style={{fontSize:10,color:"#8ea0bd",letterSpacing:".12em"}}>DUE DATE</div>
                </div>
                {!filteredTaskList.length && <div className="mono" style={{padding:"18px 20px",fontSize:12,color:"#8ea0bd"}}>No tasks match that search.</div>}
                {filteredTaskList.map(task=>(
                  <div key={task.id} style={{display:"grid",gridTemplateColumns:"44px minmax(0,1fr) 170px 110px",gap:12,alignItems:"start",padding:"12px 16px",borderBottom:"1px solid #eef3f9"}}>
                    <input type="checkbox" checked={task.done} onChange={()=>toggleTask(task.id)} style={{marginTop:2}} />
                    <div style={{minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:700,color:task.done?"#94a3b8":"#18233a",textDecoration:task.done?"line-through":"none"}}>{task.title}</div>
                    </div>
                    <div style={{fontSize:12,color:"#475569",minWidth:0,wordBreak:"break-word"}}>{task.company || "—"}</div>
                    <div className="mono" style={{fontSize:11,color:task.done?"#94a3b8":task.due_date&&task.due_date<today()?"#ef4444":"#64748b"}}>{task.due_date || "No date"}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}

      {showForm && (
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.5)",display:"grid",placeItems:"center",padding:20,zIndex:110}} onClick={e=>e.target===e.currentTarget&&setShowForm(false)}>
          <div className="slide" style={{width:"min(620px,100%)",background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,overflow:"hidden"}}>
            <div style={{borderTop:"3px solid "+TYPE_CFG[formType].color}} />
            <div style={{padding:"18px 24px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div className="condensed" style={{fontSize:20,fontWeight:800}}>{form.id?"Edit":"New"} {formType==="manufacturer"?"Company":formType==="vendor"?"Vendor":"Lost Contact"}</div>
              <button onClick={()=>setShowForm(false)} style={{width:30,height:30,border:"1px solid #e2e8f0",borderRadius:4,background:"#fff",cursor:"pointer"}}>×</button>
            </div>
            <div style={{padding:24,display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              <input className="field" style={{gridColumn:"1 / -1"}} placeholder="Company" value={form.company||""} onChange={e=>setForm(cur=>({...cur,company:e.target.value}))} />
              {formType==="manufacturer" ? <>
                <select className="field" value={form.stage||"Prospect"} onChange={e=>setForm(cur=>({...cur,stage:e.target.value}))}>{STAGES.map(s=><option key={s}>{s}</option>)}</select>
                <select className="field" value={form.industry||""} onChange={e=>setForm(cur=>({...cur,industry:e.target.value}))}><option value="">{OTHER_INDUSTRY_LABEL}</option>{INDUSTRIES.map(i=><option key={i}>{i}</option>)}</select>
                <textarea className="fieldbox" style={{gridColumn:"1 / -1",minHeight:110}} placeholder="Contacts: Name, Title, LinkedIn" value={form.contactsText||""} onChange={e=>setForm(cur=>({...cur,contactsText:e.target.value}))} />
              </> : <>
                {["name","title","email","phone","industry","region"].map(k=><input key={k} className="field" placeholder={k[0].toUpperCase()+k.slice(1)} value={form[k]||""} onChange={e=>setForm(cur=>({...cur,[k]:e.target.value}))} />)}
                {formType==="vendor" && <select className="field" value={form.stage||"Prospect"} onChange={e=>setForm(cur=>({...cur,stage:e.target.value}))}>{STAGES.map(s=><option key={s}>{s}</option>)}</select>}
                {formType==="lost" && <>
                  <select className="field" value={form.lostReason||""} onChange={e=>setForm(cur=>({...cur,lostReason:e.target.value}))}><option value="">Loss reason</option>{LOST_REASONS.map(r=><option key={r}>{r}</option>)}</select>
                  <input className="field" type="number" placeholder="Deal value" value={form.value||""} onChange={e=>setForm(cur=>({...cur,value:e.target.value}))} />
                </>}
              </>}
              <input className="field" style={{gridColumn:"1 / -1"}} placeholder="Tags (comma separated)" value={form.tags||""} onChange={e=>setForm(cur=>({...cur,tags:e.target.value}))} />
              <textarea className="fieldbox" style={{gridColumn:"1 / -1"}} placeholder="Notes" value={form.notes||""} onChange={e=>setForm(cur=>({...cur,notes:e.target.value}))} />
              <div style={{gridColumn:"1 / -1",display:"flex",justifyContent:"flex-end",gap:10}}>
                <button onClick={()=>setShowForm(false)} style={{padding:"8px 14px",border:"none",borderRadius:4,background:"#f1f5f9",color:"#64748b",cursor:"pointer"}}>Cancel</button>
                <button onClick={saveForm} style={{padding:"8px 14px",border:"none",borderRadius:4,background:"#ef4444",color:"#fff",cursor:"pointer"}}>{saving?"Saving...":(form.id?"Save Changes":"Add")}</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {importRows && (
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.5)",display:"grid",placeItems:"center",padding:20,zIndex:115}} onClick={e=>e.target===e.currentTarget&&setImportRows(null)}>
          <div className="slide" style={{width:"min(760px,100%)",background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,overflow:"hidden"}}>
            <div style={{borderTop:"3px solid #22c55e"}} />
            <div style={{padding:"18px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #e2e8f0"}}>
              <div>
                <div className="condensed" style={{fontSize:20,fontWeight:800}}>Import Preview</div>
                <div className="mono" style={{fontSize:11,color:"#64748b"}}>{validImportRows.length} valid rows · {importUniqueRows.length} unique companies · {importSkipCount} skipped</div>
              </div>
              <button onClick={()=>setImportRows(null)} style={{width:30,height:30,border:"1px solid #e2e8f0",borderRadius:4,background:"#fff",cursor:"pointer"}}>×</button>
            </div>
            <div style={{padding:"14px 24px",borderBottom:"1px solid #e2e8f0",display:"grid",gap:12,background:"#fbfdff"}}>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <button onClick={()=>setImportMode("merge")} style={{padding:"8px 12px",borderRadius:4,border:"1px solid "+(importMode==="merge"?"#1e3a8a":"#d7dfeb"),background:importMode==="merge"?"#eef4ff":"#fff",color:importMode==="merge"?"#1e3a8a":"#64748b",cursor:"pointer",fontWeight:700}}>Add / Update Only</button>
                <button onClick={()=>setImportMode("replace")} style={{padding:"8px 12px",borderRadius:4,border:"1px solid "+(importMode==="replace"?"#ef4444":"#d7dfeb"),background:importMode==="replace"?"#fef2f2":"#fff",color:importMode==="replace"?"#ef4444":"#64748b",cursor:"pointer",fontWeight:700}}>Replace Manufacturers from CSV</button>
              </div>
              <div className="mono" style={{fontSize:11,color:"#64748b",display:"flex",gap:14,flexWrap:"wrap"}}>
                <span>ADD: {importAddCount}</span>
                <span>UPDATE: {importUpdateCount}</span>
                {importMode==="replace" && <span style={{color:"#ef4444"}}>DELETE: {importDeleteCount}</span>}
              </div>
              <div style={{fontSize:12,color:"#64748b"}}>Manufacturers are created only from the CSV <span className="mono">company</span> column. Contact names, LinkedIn lines, and notes stay attached to that same company row.</div>
              {importMode==="replace" && <div style={{fontSize:12,color:"#ef4444"}}>Replace mode makes the `manufacturers` table match this CSV. Manufacturers not in the file, plus duplicate manufacturer rows, will be deleted along with their linked contacts and activities.</div>}
            </div>
            <div style={{maxHeight:"50vh",overflow:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr style={{background:"#f8fafc"}}>{["Company","Industry","Stage","Status"].map(h=><th key={h} className="mono" style={{padding:"10px 14px",fontSize:10,color:"#94a3b8",textAlign:"left",letterSpacing:".08em",borderBottom:"2px solid #e2e8f0"}}>{h}</th>)}</tr></thead><tbody>{importPreviewRows.map((r,i)=>{const ok=isLikelyCompanyName(r.company); return <tr key={i}><td style={{padding:"10px 14px",borderBottom:"1px solid #f1f5f9",color:ok?"#0f172a":"#ef4444",fontWeight:600}}>{r.company||"SKIPPED"}</td><td style={{padding:"10px 14px",borderBottom:"1px solid #f1f5f9"}}>{r.industry||"—"}</td><td style={{padding:"10px 14px",borderBottom:"1px solid #f1f5f9"}}>{normalizeStage(r.stage)}</td><td style={{padding:"10px 14px",borderBottom:"1px solid #f1f5f9"}}><Tag label={ok?"READY":"SKIP"} color={ok?"#22c55e":"#ef4444"} /></td></tr>;})}</tbody></table>
            </div>
            <div style={{padding:"14px 24px",display:"flex",justifyContent:"flex-end",gap:10,borderTop:"1px solid #e2e8f0"}}>
              <button onClick={()=>setImportRows(null)} style={{padding:"8px 14px",border:"none",borderRadius:4,background:"#f1f5f9",color:"#64748b",cursor:"pointer"}}>Cancel</button>
              <button onClick={commitImport} style={{padding:"8px 14px",border:"none",borderRadius:4,background:importMode==="replace"?"#ef4444":"#22c55e",color:"#fff",cursor:"pointer"}}>{importMode==="replace"?"Confirm Replace":"Confirm Import"}</button>
            </div>
          </div>
        </div>
      )}

      <div style={{position:"fixed",right:24,bottom:24,zIndex:140,display:"grid",gap:8,justifyItems:"end"}}>
        {showEmailFmt && (
          <div className="slide" style={{width:300,background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,padding:16,boxShadow:"0 8px 30px rgba(0,0,0,.15)"}}>
            <div className="mono" style={{fontSize:11,color:"#16a34a",letterSpacing:".08em",marginBottom:10}}>EMAIL FORMATTER</div>
            <input className="field" style={{marginBottom:8}} placeholder="John Smith" value={efName} onChange={e=>setEfName(e.target.value)} />
            <input className="field" style={{marginBottom:8}} placeholder="company.com" value={efDomain} onChange={e=>setEfDomain(e.target.value)} />
            <select className="field" value={efFmt} onChange={e=>setEfFmt(e.target.value)}><option value="{first}.{last}">{"{first}.{last}"}</option><option value="{first}{last}">{"{first}{last}"}</option><option value="{first}">{"{first}"}</option><option value="{f}{last}">{"{f}{last}"}</option><option value="{f}.{last}">{"{f}.{last}"}</option><option value="{first}_{last}">{"{first}_{last}"}</option><option value="{last}.{first}">{"{last}.{first}"}</option></select>
            {efName&&efDomain && <div style={{marginTop:10,padding:"8px 10px",borderRadius:4,background:"#f0fdf4",border:"1px solid #bbf7d0",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}><span className="mono" style={{fontSize:12,color:"#15803d"}}>{fmtEmail(efName,efDomain,efFmt)}</span><button onClick={()=>{navigator.clipboard.writeText(fmtEmail(efName,efDomain,efFmt)); toast2("Copied");}} style={{padding:"4px 8px",border:"1px solid #bbf7d0",borderRadius:4,background:"#fff",cursor:"pointer"}}>Copy</button></div>}
          </div>
        )}
        <button onClick={()=>setShowEmailFmt(v=>!v)} style={{width:46,height:46,border:"none",borderRadius:999,background:showEmailFmt?"#16a34a":"#1e3a8a",color:"#fff",fontSize:18,cursor:"pointer",boxShadow:"0 4px 14px rgba(0,0,0,.2)"}}>✉</button>
      </div>

      {toast && <div style={{position:"fixed",left:"50%",bottom:24,transform:"translateX(-50%)",background:"#0f172a",color:"#f8fafc",padding:"10px 20px",borderRadius:6,boxShadow:"0 4px 20px rgba(0,0,0,.25)",zIndex:120}}>{toast}</div>}
      {saving && <div className="mono" style={{position:"fixed",right:24,bottom:24,background:"#1e3a8a",color:"#fff",padding:"8px 14px",borderRadius:6,zIndex:121}}>Saving...</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
