const containsLeadFinderHint = (values, hints=[]) => {
  const haystack = (Array.isArray(values) ? values : [values]).filter(Boolean).join(" ").toLowerCase();
  return hints.some(hint => haystack.includes(String(hint || "").toLowerCase()));
};
const isLeadFinderStreetAddress = value => {
  const text = String(value || "").trim();
  return !!text && /\d/.test(text) && LEAD_FINDER_ADDRESS_REGEX.test(text);
};
const isLeadFinderPhone = value => LEAD_FINDER_PHONE_REGEX.test(String(value || "").trim());
const isLeadFinderPersonName = value => {
  const text = String(value || "").trim();
  if(!text) return false;
  if(containsLeadFinderHint(text, LEAD_FINDER_WEAK_CONTACT_HINTS)) return false;
  const tokens = text.replace(/[^a-zA-Z' -]/g," ").split(/\s+/).filter(Boolean);
  if(tokens.length < 2) return false;
  const genericTokens = new Set(["team","department","office","staff","operations","production","plant","maintenance","contact","manager","line","desk"]);
  return tokens.some(token => !genericTokens.has(token.toLowerCase()));
};
const isLeadFinderProductionTitle = value => {
  const text = String(value || "").trim().toLowerCase();
  return !!text && LEAD_FINDER_PRODUCTION_ROLE_HINTS.some(hint => text.includes(hint));
};
const isLeadFinderContactSourceUsable = value => {
  const text = String(value || "").trim();
  return !!text && !containsLeadFinderHint(text, LEAD_FINDER_WEAK_SOURCE_HINTS);
};

  const active = normalizeLeadFinderIndustries(industries).filter(industry => industry!==OTHER_INDUSTRY_LABEL);
  return active.length===1 && active[0]==="Food and Beverage";
};
const collectLeadFinderValidationIssues = (lead, industries=[], options={}) => {
  const requireProductionContact = options.requireProductionContact===true;
  const issues = [];
  if(!lead?.company) issues.push("missing company name");
  if(LEAD_FINDER_PREVIOUSLY_SURFACED_COMPANIES.some(company => normalizeCompanyKey(company)===normalizeCompanyKey(lead?.company || ""))){
    issues.push("already surfaced in earlier research");
  }
  const facilities = Array.isArray(lead?.facilities) ? lead.facilities : [];
  const contacts = Array.isArray(lead?.contacts) ? lead.contacts : [];
  const evidence = Array.isArray(lead?.evidence) ? lead.evidence : [];
  const validFacility = facilities.find(facility => isLeadFinderStreetAddress(facility?.address) && isLeadFinderPhone(facility?.phone));
  if(!validFacility) issues.push("missing public facility address and phone");
  const validContact = contacts.find(contact => isLeadFinderPersonName(contact?.name) && isLeadFinderProductionTitle(contact?.title) && isLeadFinderContactSourceUsable(contact?.source));
  if(requireProductionContact && !validContact) issues.push("missing named production or operations contact");
  const evidenceCount = evidence.filter(item => /^https?:\/\//i.test(String(item?.url || "").trim())).length;
  if(evidenceCount < 2) issues.push("missing multiple public source links");
  if(!String(lead?.verification || "").trim()) issues.push("missing facility verification");
  if(!String(lead?.end_product || "").trim()) issues.push("missing product summary");
  if(isFoodAndBeverageOnlySearch(industries)){
    if(normalizeIndustry(lead?.industry)!=="Food and Beverage"){
      issues.push("industry is not Food and Beverage");
    }
    if(containsLeadFinderHint([lead?.company, lead?.verification, lead?.end_product, lead?.notes], LEAD_FINDER_FOOD_REJECT_HINTS)){
      issues.push("looks like retail, restaurant, distribution, packaging-only, or another non-manufacturing fit");
    }
    if(!containsLeadFinderHint([lead?.verification, lead?.end_product, lead?.notes], LEAD_FINDER_FOOD_PROCESS_HINTS)){
      issues.push("does not clearly describe food or beverage production");
    }
  }
  return issues;
};
const hasLeadFinderProductionContact = lead => {
  const contacts = Array.isArray(lead?.contacts) ? lead.contacts : [];
  return contacts.some(contact => isLeadFinderPersonName(contact?.name) && isLeadFinderProductionTitle(contact?.title) && isLeadFinderContactSourceUsable(contact?.source));
};
const formatLeadFinderDuplicateSource = duplicate => {
  if(!duplicate) return "duplicate";
  if(duplicate.source==="history") return "already reviewed previously";
  if(duplicate.source==="crm") return "in CRM";
  return "already in Lead Finder";
};
const buildLeadFinderNotes = lead => {
  const facilityLines = (lead.facilities || [])
    .map(facility => [facility.address, facility.phone ? `Phone: ${facility.phone}` : ""].filter(Boolean).join(" | "))
    .filter(Boolean);
  const contactLines = (lead.contacts || [])
    .map(contact => [contact.name, contact.title, contact.source].filter(Boolean).join(" | "))
    .filter(Boolean);
  return [
    lead.end_product ? `End product\n${lead.end_product}` : "",
    lead.verification ? `Facility confirmation\n${lead.verification}` : "",
    String(lead.notes || "").trim(),
    facilityLines.length ? `Locations\n${facilityLines.join("\n")}` : "",
    contactLines.length ? `Production contacts\n${contactLines.join("\n")}` : "",
  ].filter(Boolean).join("\n\n");
};
const normalizeLeadFinderLead = (lead, fallback={}) => {
  const facilities = (Array.isArray(lead?.facilities) ? lead.facilities : [])
    .map(normalizeLeadFinderFacility)
    .filter(facility => facility.address || facility.phone);
  const contacts = (Array.isArray(lead?.contacts) ? lead.contacts : [])
    .map(normalizeLeadFinderContact)
    .filter(contact => contact.name || contact.title || contact.source);
  const evidence = (Array.isArray(lead?.evidence) ? lead.evidence : [])
    .map(normalizeLeadFinderEvidence)
    .filter(item => item.label || item.url);
  const normalized = {
    id: String(lead?.id || `${Date.now()}-${Math.random().toString(36).slice(2,8)}`),
    company: String(lead?.company || fallback.company || "").trim(),
    industry: String(lead?.industry || fallback.industry || "").trim() || fallback.industry || OTHER_INDUSTRY_LABEL,
    city: String(lead?.city || fallback.city || "").trim(),
    stage: LEAD_FINDER_STAGE,
    verification: String(lead?.verification || "").trim(),
    end_product: String(lead?.end_product || fallback.end_product || "").trim(),
    notes: String(lead?.notes || "").trim(),
    facilities,
    contacts,
    evidence,
    duplicate_hint: String(lead?.duplicate_hint || "").trim(),
    foundAt: lead?.foundAt || new Date().toISOString(),
    source: String(lead?.source || fallback.source || "Lead Finder").trim(),
    status: String(lead?.status || fallback.status || "New").trim(),
  };
  return {
    ...normalized,
    notes: buildLeadFinderNotes(normalized),
  };
};

  const raw = payload?.result?.leads ? payload.result : payload;
  const leads = Array.isArray(raw?.leads) ? raw.leads : Array.isArray(raw) ? raw : [];

    summary: String(raw?.summary || "").trim(),
    logs: Array.isArray(raw?.logs) ? raw.logs.map(item => String(item || "").trim()).filter(Boolean) : [],

};

const parseQuestionDateWindow = question => {
  const normalized = String(question || "").toLowerCase();
  if(!normalized) return null;
  if(normalized.includes("today")) return {from:today(), to:today(), label:"today"};
  if(normalized.includes("yesterday")) return {from:dateDaysAgo(1), to:dateDaysAgo(1), label:"yesterday"};
  if(questionIncludes(normalized, ["the other day","other day"])) return {from:dateDaysAgo(4), to:today(), label:"the last few days"};
  if(questionIncludes(normalized, ["couple days ago","a couple days ago","few days ago","a few days ago"])) return {from:dateDaysAgo(4), to:dateDaysAgo(1), label:"the last few days"};
  const exactDaysAgo = normalized.match(/(\d+)\s+days?\s+ago/);
  if(exactDaysAgo){
    const exactDate = dateDaysAgo(parseInt(exactDaysAgo[1],10) || 0);
    return {from:exactDate, to:exactDate, label:`${exactDaysAgo[1]} days ago`};
  }
  const recentDays = normalized.match(/(?:last|past)\s+(\d+)\s+days?/);
  if(recentDays){
    const days = Math.max(1, parseInt(recentDays[1],10) || 1);
    return {from:dateDaysAgo(days), to:today(), label:`the last ${days} days`};
  }
  if(normalized.includes("this week")) return {from:weekStartDate(0), to:today(), label:"this week"};
  if(normalized.includes("last week")) return {from:weekStartDate(1), to:weekEndDate(1), label:"last week"};
  if(questionIncludes(normalized, ["recently","lately"])) return {from:dateDaysAgo(7), to:today(), label:"recently"};

};

};
const formatAskTaskLine = task => [task.due_date || "No due date", task.done ? "Done" : "Open", displayOwner(task.owner), task.title || ""].filter(Boolean).join(" | ");
const formatAskActivityLine = act => [act.date || "No date", act.type || "Note", displayOwner(act.created_by), act.note || ""].filter(Boolean).join(" | ");
const withAskedQuestion = (result, askedQuestion) => result ? {...result, askedQuestion:String(askedQuestion || "").trim()} : result;

const buildAskReplySavedResult = (question, feedback, feedbackEntries=[]) => ({

const buildAskCrmAnswer = (question, records, tasks, acts, feedbackEntries=[], preferredOwner=null) => {
  const rawQuestion = String(question || "").trim();
  if(!rawQuestion) return null;
  const normalized = rawQuestion.toLowerCase();
  const rememberedFeedback = findRelevantAskFeedback(rawQuestion, feedbackEntries);
  const owner = detectQuestionOwner(normalized) || (PEOPLE.includes(preferredOwner) ? preferredOwner : null);
  const stage = detectQuestionStage(normalized);
  const industry = detectQuestionIndustry(normalized);
  const type = detectQuestionType(normalized);
  const wantsCount = questionIncludes(normalized, ["how many","count","number of"]);
  const wantsTasks = questionIncludes(normalized, ["task","tasks","follow up","follow-up","followups"]);
  const wantsActivities = questionIncludes(normalized, ["activity","activities","last activity","last touch","calls","emails","meetings","logged"]);
  const wantsContacts = questionIncludes(normalized, ["contact","contacts","linkedin","email","phone"]);
  const wantsNotes = questionIncludes(normalized, ["note","notes","about","know about","info","information"]);
  const wantsOverdue = questionIncludes(normalized, ["overdue","due today","due / overdue","due/overdue"]);
  const wantsUpcoming = questionIncludes(normalized, ["upcoming","future","next up"]);
  const wantsCompleted = questionIncludes(normalized, ["completed","done","finished"]);
  const wantsPeople = questionIncludes(normalized, ["who","person","people","name","names","guy","girl","contact"]);
  const wantsNegativeInterest = questionIncludes(normalized, ["not interested","uninterested","no interest"]);
  const wantsPositiveInterest = !wantsNegativeInterest && questionIncludes(normalized, ["interested","interest","keen","open to","wants quote","wants pricing","wants info"]);
  const wantsNarrativeActivity = questionIncludes(normalized, ["what happened","what happened with","what happened to","what did","what was said","tell me about","what about"]);
  const activityContext = wantsActivities || questionIncludes(normalized, ["reached","reach","spoke","talked","called","emailed","messaged","connected","contacted","followed up","followed-up","replied","responded","response","logged"]);
  const dateWindow = parseQuestionDateWindow(normalized);
  const activityDrivenQuestion = activityContext || wantsPositiveInterest || wantsNegativeInterest || (wantsPeople && (owner || dateWindow || questionIncludes(normalized, ["reached","interest","interested","called","emailed","messaged","talked","spoke","responded","replied"])));

  const scoredRecords = (records || []).map(record => {
    const recordTasks = (tasks || []).filter(task => taskMatchesRecord(task, record));
    const recordActs = (acts || []).filter(act => `${act.contact_type || "manufacturer"}:${act.contactId}`===recordKey(record));
    return {record, score:scoreQuestionAgainstRecord(normalized, record, recordTasks, recordActs)};
  }).sort((a,b) => b.score - a.score);
  const bestRecord = scoredRecords[0]?.score >= 0.56 ? scoredRecords[0].record : null;

  if(activityDrivenQuestion){
    let activityPool = [...(acts || [])];
    if(owner) activityPool = activityPool.filter(act => displayOwner(act.created_by)===owner);
    if(type) activityPool = activityPool.filter(act => (act.contact_type || "manufacturer")===type);
    if(dateWindow) activityPool = activityPool.filter(act => activityMatchesDateWindow(act, dateWindow));
    const activityMatches = activityPool
      .map(act => {
        const record = records.find(item => `${act.contact_type || "manufacturer"}:${act.contactId}`===recordKey(item));
        if(!record) return null;
        if(stage && normalizeStage(record.stage)!==stage) return null;
        if(industry && getIndustryBucket(record.industry)!==industry) return null;
        const contact = detectActivityContact(act, record);
        const interestState = detectActivityInterestState(act);
        if(wantsPositiveInterest && interestState!=="positive") return null;
        if(wantsNegativeInterest && interestState!=="negative") return null;
        const score = scoreQuestionAgainstActivity(normalized, act, record, contact, dateWindow, owner, wantsPositiveInterest, wantsNegativeInterest);
        return {act, record, contact, score};
      })
      .filter(Boolean)
      .sort((a,b) => {
        if(b.score !== a.score) return b.score - a.score;
        return String(b.act.date || "").localeCompare(String(a.act.date || ""));
      });
    if(activityMatches.length){
      const topMatches = activityMatches.slice(0,8);
      const linkedRecords = [...new Map(topMatches.map(match => [recordKey(match.record), match.record])).values()].slice(0, (wantsPeople || wantsNarrativeActivity) ? 3 : 8);
      const bestMatch = topMatches[0];
      const lines = (wantsPeople || wantsNarrativeActivity)
        ? topMatches.slice(0,3).map((match, index) => {
            const person = describeAskContact(match.contact) || "No named contact saved";
            const prefix = index===0 ? "Why I picked that:" : "Also worth checking:";
            return `${prefix} ${person} at ${match.record.company} on ${match.act.date || "an unknown date"}. ${summarizeActivityNote(match.act.note)}`;
          })
        : topMatches.map(match => {
            const person = describeAskContact(match.contact) || "";
            return [match.act.date || "No date", displayOwner(match.act.created_by), match.record.company, person, match.act.note || ""].filter(Boolean).join(" | ");
          });
      const title = (wantsPeople || wantsNarrativeActivity) ? "Best answer" : (owner ? `${owner}'s activity` : "Activity results");
      const answerParts = [];
      if(wantsPeople || wantsNarrativeActivity || wantsPositiveInterest || wantsNegativeInterest){
        answerParts.push(buildAskActivityAnswer(bestMatch, { wantsPositiveInterest, wantsNegativeInterest }));
      } else {
        answerParts.push(`${activityMatches.length} matching activit${activityMatches.length===1?"y":"ies"} found.`);
      }
      const metaSummaryParts = [];
      if(owner) metaSummaryParts.push(`${owner}'s logs`);
      if(dateWindow?.label) metaSummaryParts.push(dateWindow.label);
      return {
        title,
        answer: (wantsPeople || wantsNarrativeActivity || wantsPositiveInterest || wantsNegativeInterest) ? answerParts.join(" ") : "",
        summary: (wantsPeople || wantsNarrativeActivity || wantsPositiveInterest || wantsNegativeInterest) ? (metaSummaryParts.join(" · ") || "Based on your CRM activity log.") : [...answerParts, ...metaSummaryParts].join(" "),
        lines: wantsCount ? [] : lines,
        records: linkedRecords,
        rememberedFeedback,
      };
    }
  }

  if(bestRecord){
    const recordTasks = sortTasksByNearest((tasks || []).filter(task => taskMatchesRecord(task, bestRecord)));
    const openTasks = recordTasks.filter(task => !task.done);
    const doneTasks = recordTasks.filter(task => task.done);
    const recordActs = [...(acts || [])]
      .filter(act => `${act.contact_type || "manufacturer"}:${act.contactId}`===recordKey(bestRecord))
      .sort((a,b) => String(b.date || "").localeCompare(String(a.date || "")));
    const taskLines = (wantsCompleted ? doneTasks : openTasks).slice(0,8).map(formatAskTaskLine);
    const activityLines = recordActs.slice(0,8).map(formatAskActivityLine);
    const contactLines = bestRecord.type==="manufacturer"
      ? (bestRecord.contacts || []).map(contact => [contact.name, contact.title, contact.linkedin].filter(Boolean).join(" | "))
      : [[bestRecord.name, bestRecord.title, bestRecord.email, bestRecord.phone].filter(Boolean).join(" | ")].filter(Boolean);
    if(wantsContacts){
      return {
        title: `Contacts for ${bestRecord.company}`,
        summary: contactLines.length ? `${contactLines.length} contact ${contactLines.length===1?"entry":"entries"} found.` : "No contacts saved on this record yet.",
        lines: contactLines.length ? contactLines : ["No contacts saved yet."],
        records: [bestRecord],
        rememberedFeedback,
      };
    }
    if(wantsTasks){
      return {
        title: `${wantsCompleted ? "Completed" : "Open"} follow-ups for ${bestRecord.company}`,
        summary: `${wantsCompleted ? doneTasks.length : openTasks.length} ${wantsCompleted ? "completed" : "open"} follow-up${(wantsCompleted ? doneTasks.length : openTasks.length)===1?"":"s"} found.`,
        lines: taskLines.length ? taskLines : [`No ${wantsCompleted ? "completed" : "open"} follow-ups found.`],
        records: [bestRecord],
        rememberedFeedback,
      };
    }
    if(wantsActivities){
      return {
        title: `Activity for ${bestRecord.company}`,
        summary: recordActs.length ? `Last activity: ${bestRecord.lastContact || recordActs[0]?.date || "Unknown"}.` : "No activity logged yet.",
        lines: activityLines.length ? activityLines : ["No activities logged yet."],
        records: [bestRecord],
        rememberedFeedback,
      };
    }
    return {
      title: bestRecord.company,
      summary: [TYPE_CFG[bestRecord.type]?.label?.slice(0,-1) || bestRecord.type, bestRecord.stage || "", bestRecord.industry || OTHER_INDUSTRY_LABEL, bestRecord.lastContact ? `Last activity ${bestRecord.lastContact}` : ""].filter(Boolean).join(" · "),
      lines: [
        ...(contactLines.length ? [`Contacts: ${contactLines.slice(0,4).join(" ;; ")}`] : []),
        ...(openTasks.length ? [`Open follow-ups: ${openTasks.slice(0,4).map(formatAskTaskLine).join(" ;; ")}`] : []),
        ...(activityLines.length ? [`Recent activity: ${activityLines.slice(0,4).join(" ;; ")}`] : []),
        ...(richNotesPlainText(bestRecord.notes || "") ? [`Notes: ${richNotesPlainText(bestRecord.notes || "").slice(0,1200)}`] : []),
      ],
      records: [bestRecord],
      rememberedFeedback,
    };
  }

  if(wantsTasks){
    let taskPool = [...(tasks || [])];
    if(owner) taskPool = taskPool.filter(task => displayOwner(task.owner)===owner);
    if(type) taskPool = taskPool.filter(task => (task.contact_type || "manufacturer")===type);
    if(wantsCompleted) taskPool = taskPool.filter(task => task.done);
    else taskPool = taskPool.filter(task => !task.done);
    if(wantsOverdue) taskPool = taskPool.filter(task => task.due_date && task.due_date<=today());
    if(wantsUpcoming) taskPool = taskPool.filter(task => !task.due_date || task.due_date>today());
    const sortedTasks = sortTasksByNearest(taskPool);
    const linkedRecords = sortedTasks.map(task => records.find(record => taskMatchesRecord(task, record))).filter(Boolean).slice(0,6);
    return {
      title: owner ? `${owner}'s follow-ups` : "Follow-ups",
      summary: wantsCount ? `${sortedTasks.length} matching follow-up${sortedTasks.length===1?"":"s"}.` : `${sortedTasks.length} matching follow-up${sortedTasks.length===1?"":"s"} found.`,
      lines: wantsCount ? [] : (sortedTasks.slice(0,8).map(formatAskTaskLine).length ? sortedTasks.slice(0,8).map(formatAskTaskLine) : ["No follow-ups matched that question."]),
      records: linkedRecords,
      rememberedFeedback,
    };
  }

  if(wantsActivities){
    let activityPool = [...(acts || [])];
    if(owner) activityPool = activityPool.filter(act => displayOwner(act.created_by)===owner);
    const sortedActs = activityPool.sort((a,b) => String(b.date || "").localeCompare(String(a.date || "")));
    const linkedRecords = sortedActs.map(act => records.find(record => `${act.contact_type || "manufacturer"}:${act.contactId}`===recordKey(record))).filter(Boolean).slice(0,6);
    return {
      title: owner ? `${owner}'s activity` : "Activity results",
      summary: wantsCount ? `${sortedActs.length} matching activit${sortedActs.length===1?"y":"ies"}.` : `${sortedActs.length} matching activit${sortedActs.length===1?"y":"ies"} found.`,
      lines: wantsCount ? [] : (sortedActs.slice(0,8).map(formatAskActivityLine).length ? sortedActs.slice(0,8).map(formatAskActivityLine) : ["No activities matched that question."]),
      records: linkedRecords,
      rememberedFeedback,
    };
  }

  let recordPool = [...(records || [])];
  if(type) recordPool = recordPool.filter(record => record.type===type);
  if(stage) recordPool = recordPool.filter(record => normalizeStage(record.stage)===stage);
  if(industry) recordPool = recordPool.filter(record => getIndustryBucket(record.industry)===industry);
  if(owner){
    const ownerKeys = new Set((tasks || []).filter(task => displayOwner(task.owner)===owner).map(task => `${task.contact_type || "manufacturer"}:${task.contact_id}`));
    recordPool = recordPool.filter(record => ownerKeys.has(recordKey(record)));
  }
  if(stage || industry || type || owner){
    const sortedRecords = [...recordPool].sort((a,b) => String(a.company || "").localeCompare(String(b.company || "")));
    return {
      title: "CRM results",
      summary: `${sortedRecords.length} matching compan${sortedRecords.length===1?"y":"ies"} found.`,
      lines: wantsCount ? [] : sortedRecords.slice(0,10).map(record => [record.company, TYPE_CFG[record.type]?.label?.slice(0,-1) || record.type, record.stage || "", getIndustryBucket(record.industry), record.lastContact ? `Last activity ${record.lastContact}` : ""].filter(Boolean).join(" | ")),
      records: sortedRecords.slice(0,10),
      rememberedFeedback,
    };
  }

  const fallbackMatches = scoredRecords.filter(item => item.score>=0.18).slice(0,8).map(item => item.record);
  if(fallbackMatches.length){
    return {
      title: "Closest CRM matches",
      summary: `I found ${fallbackMatches.length} likely match${fallbackMatches.length===1?"":"es"} based on your question.`,
      lines: fallbackMatches.map(record => [record.company, TYPE_CFG[record.type]?.label?.slice(0,-1) || record.type, record.stage || "", getIndustryBucket(record.industry), record.lastContact ? `Last activity ${record.lastContact}` : ""].filter(Boolean).join(" | ")),
      records: fallbackMatches,
      rememberedFeedback,
    };
  }

  return {
    title: "No strong match",
    summary: "I couldn't find a clear answer from the CRM data I have loaded right now.",
    lines: [
      "Try a company name, stage, industry, owner, task, or activity question.",
      "Example: Which prospects have overdue tasks?",
    ],
    records: [],
    rememberedFeedback,
  };
};

const EXTERNAL_LINK_RE = /((?:https?:\/\/|www\.|(?:[a-z0-9-]+\.)+[a-z]{2,}\/)[^\s<]+)/gi;
const isExternalLinkText = value => /^(?:https?:\/\/|www\.|(?:[a-z0-9-]+\.)+[a-z]{2,}\/)[^\s<]*$/i.test(String(value || "").trim());
const normalizeExternalUrl = value => {
  const raw = String(value || "").trim();
  if(!raw) return "";
  if(/^https?:\/\//i.test(raw)) return raw;
  return "https://" + raw.replace(/^\/+/, "");
};
const escapeHtml = value => String(value || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const linkifiedHtml = text => String(text || "").split(EXTERNAL_LINK_RE).map(part => isExternalLinkText(part)
  ? `<span data-external-url="${escapeHtml(normalizeExternalUrl(part))}" style="color:#1d4ed8;text-decoration:underline;word-break:break-all;cursor:pointer;">${escapeHtml(part)}</span>`
  : escapeHtml(part)
).join("");
const editableTextFromElement = element => String(element?.innerText || "").replace(/\u00A0/g," ").replace(/\r/g,"").replace(/\n$/, "");
const cleanupRichNotesHtml = html => String(html || "")
  .replace(/(?:\s*<br>\s*){3,}/gi, "<br><br>")
  .replace(/^(?:\s*<br>\s*)+|(?:\s*<br>\s*)+$/gi, "");
const richNotesFromPlainText = text => cleanupRichNotesHtml(escapeHtml(String(text || "")).replace(/\r?\n/g, "<br>"));
const isBoldRichNode = node => {
  if(!node || node.nodeType!==1) return false;
  const tag = node.tagName.toLowerCase();
  if(tag==="strong" || tag==="b") return true;
  const fontWeight = String(node.style?.fontWeight || "").toLowerCase();
  return fontWeight==="bold" || fontWeight==="bolder" || Number.parseInt(fontWeight, 10) >= 600;
};
const richNotesPlainText = raw => {
  const template = document.createElement("template");
  template.innerHTML = String(raw || "");
  const walk = nodes => Array.from(nodes || []).map(node => {
    if(node.nodeType===3) return node.textContent || "";
    if(node.nodeType!==1) return "";
    const tag = node.tagName.toLowerCase();
    if(tag==="br") return "\n";
    const inner = walk(node.childNodes);
    if(["div","p","li"].includes(tag)) return `${inner}\n`;
    return inner;
  }).join("");
  return walk(template.content.childNodes).replace(/\u00A0/g, " ").replace(/\r/g, "").replace(/\n{3,}/g, "\n\n").trim();
};
const serializeRichNotesNode = node => {
  if(node.nodeType===3) return escapeHtml(node.textContent || "");
  if(node.nodeType!==1) return "";
  const tag = node.tagName.toLowerCase();
  if(tag==="br") return "<br>";
  if(tag==="a"){
    const text = (node.textContent || "").trim();
    const href = String(node.getAttribute("href") || "").trim();
    const combined = text
      ? (href && !text.includes(href) && !isExternalLinkText(text) ? `${text} ${href}` : text)
      : href;
    return richNotesFromPlainText(combined);
  }
  const inner = Array.from(node.childNodes || []).map(serializeRichNotesNode).join("");
  if(isBoldRichNode(node)) return inner ? `<strong>${inner}</strong>` : "";
  if(["div","p","li"].includes(tag)) return `${inner}<br>`;
  return inner;
};
const richNotesFromHtml = rawHtml => {
  const template = document.createElement("template");
  template.innerHTML = String(rawHtml || "");
  return cleanupRichNotesHtml(Array.from(template.content.childNodes || []).map(serializeRichNotesNode).join(""));
};
const richNotesFromElement = element => richNotesFromHtml(element?.innerHTML || "");
const renderRichNotesHtml = raw => {
  const template = document.createElement("template");
  template.innerHTML = String(raw || "");
  const walk = nodes => Array.from(nodes || []).map(node => {
    if(node.nodeType===3) return linkifiedHtml(node.textContent || "");
    if(node.nodeType!==1) return "";
    const tag = node.tagName.toLowerCase();
    if(tag==="br") return "<br>";
    if(isBoldRichNode(node)){
      const inner = walk(node.childNodes);
      return inner ? `<strong>${inner}</strong>` : "";
    }
    if(tag==="a"){
      const text = (node.textContent || "").trim();
      const href = normalizeExternalUrl(node.getAttribute("href") || text);
      const label = text || href;
      return label ? `<span data-external-url="${escapeHtml(href)}" style="color:#1d4ed8;text-decoration:underline;word-break:break-all;cursor:pointer;">${escapeHtml(label)}</span>` : "";
    }
    const inner = walk(node.childNodes);
    if(["div","p","li"].includes(tag)) return `${inner}<br>`;
    return inner;
  }).join("");
  return cleanupRichNotesHtml(walk(template.content.childNodes));
};
const insertHtmlAtSelection = html => {
  if(document.queryCommandSupported?.("insertHTML")){
    document.execCommand("insertHTML", false, html);
    return;
  }
  const selection = window.getSelection();
  if(!selection?.rangeCount) return;
  const range = selection.getRangeAt(0);
  range.deleteContents();
  const fragment = range.createContextualFragment(html);
  const lastNode = fragment.lastChild;
  range.insertNode(fragment);
  if(lastNode){
    range.setStartAfter(lastNode);
    range.collapse(true);
    selection.removeAllRanges();
    selection.addRange(range);
  }
};

  return "";
};
const LinkifiedText = ({ text, style }) => {

  return (
    <div style={{whiteSpace:"pre-wrap",wordBreak:"break-word",...style}}>
      {parts.map((part, index) => isExternalLinkText(part)
        ? <a key={index} href={normalizeExternalUrl(part)} target="_blank" rel="noreferrer" onMouseDown={e=>e.stopPropagation()} onPointerDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()} style={{color:"#1d4ed8",textDecoration:"underline",wordBreak:"break-all",cursor:"pointer"}}>{part}</a>
        : <React.Fragment key={index}>{part}</React.Fragment>
      )}
    </div>
  );
};

const EditableLinkField = React.forwardRef(({ value, onChange, onBlurSave, onAutoSave, onMeasure, placeholder, height, style, richText=false }, forwardedRef) => {
  const innerRef = useRef(null);
  const latestValueRef = useRef(value || "");
  const saveTimerRef = useRef(null);

  const scheduleAutoSave = useCallback(nextValue => {
    latestValueRef.current = nextValue;
    if(!onAutoSave) return;
    if(saveTimerRef.current) window.clearTimeout(saveTimerRef.current);
    saveTimerRef.current = window.setTimeout(()=>{
      saveTimerRef.current = null;
      onAutoSave(latestValueRef.current);
    }, 150);
  },[onAutoSave]);

  useEffect(()=>{
    const element = innerRef.current;
    if(!element || document.activeElement===element) return;
    const html = richText ? renderRichNotesHtml(value) : linkifiedHtml(value);
    if(element.innerHTML !== html) element.innerHTML = html;
  },[value, richText]);

  useEffect(()=>{
    latestValueRef.current = value || "";
  },[value]);

  useEffect(()=>{
    if(typeof forwardedRef === "function") forwardedRef(innerRef.current);
    else if(forwardedRef) forwardedRef.current = innerRef.current;
  },[forwardedRef]);

  useEffect(()=>()=> {
    if(saveTimerRef.current){
      window.clearTimeout(saveTimerRef.current);
      saveTimerRef.current = null;
      onAutoSave?.(latestValueRef.current);
    }
  },[onAutoSave]);

  return (
    <div
      ref={innerRef}
      className="editablebox"
      contentEditable
      suppressContentEditableWarning
      data-placeholder={placeholder}
      style={{height,minHeight:height,border:"1px solid #eef2f7",background:"#fff",...style}}
      onInput={e=>{
        const nextValue = richText ? richNotesFromElement(e.currentTarget) : editableTextFromElement(e.currentTarget);
        onChange(nextValue);
        scheduleAutoSave(nextValue);
        onMeasure?.();
      }}
      onPaste={e=>{
        e.preventDefault();
        const html = richText
          ? renderRichNotesHtml(
              e.clipboardData?.getData("text/html")
                ? richNotesFromHtml(e.clipboardData.getData("text/html"))
                : richNotesFromPlainText(e.clipboardData?.getData("text/plain") || "")
            )
          : linkifiedHtml(e.clipboardData?.getData("text/plain") || "").replace(/\r?\n/g, "<br>");
        insertHtmlAtSelection(html);
        window.requestAnimationFrame(()=>{
          const nextValue = richText ? richNotesFromElement(innerRef.current) : editableTextFromElement(innerRef.current);
          onChange(nextValue);
          scheduleAutoSave(nextValue);
          onMeasure?.();
        });
      }}
      onBlur={e=>{
        const nextValue = richText ? richNotesFromElement(e.currentTarget) : editableTextFromElement(e.currentTarget);
        if(saveTimerRef.current){
          window.clearTimeout(saveTimerRef.current);
          saveTimerRef.current = null;
        }
        e.currentTarget.innerHTML = richText ? renderRichNotesHtml(nextValue) : linkifiedHtml(nextValue);
        onMeasure?.();
        onBlurSave?.(nextValue);
      }}
      onPointerDown={e=>{
        const url = clickedExternalUrl(e, innerRef.current);
        if(!url) return;
        e.preventDefault();
        e.stopPropagation();
        window.open(url, "_blank", "noopener,noreferrer");
      }}
      onClick={e=>{
        const url = clickedExternalUrl(e, innerRef.current);
        if(!url) return;
        e.preventDefault();
        e.stopPropagation();
      }}
    />
  );
});

    if(!state){
      state = {inFlight:false,pendingRaw:null,pendingWorker:null,resolvers:[]};
      queue.set(saveKey, state);
    }
    return new Promise(resolve => {
      state.pendingRaw = raw;
      state.pendingWorker = worker;
      state.resolvers.push(resolve);
      const run = async () => {
        if(state.inFlight || state.pendingWorker == null) return;
        state.inFlight = true;
        const nextRaw = state.pendingRaw;
        const nextWorker = state.pendingWorker;
        const resolvers = state.resolvers.splice(0, state.resolvers.length);
        state.pendingRaw = null;
        state.pendingWorker = null;
        let result = false;
        try{
          result = await nextWorker(nextRaw);
        }finally{
          resolvers.forEach(done => done(result));
          state.inFlight = false;
          if(state.pendingWorker != null){
            run();

        const payload = keepRecord
          ? {...basePayload, tags: uniqueTags([...(keepRecord.tags || []), ...(row.tags || [])])}
          : {...basePayload, tags: uniqueTags([...(row.tags || []), ...(importBatchTag ? [importBatchTag] : [])])};

        if(keepRecord){
          ensureOk(await sb.from("manufacturers").update(payload).eq("id",keepRecord.id));
          if(importMode==="replace" || importContacts.length) await replaceManufacturerContacts(keepRecord.id, importContacts);
          if(importMode==="replace") manufacturerIdsToDelete.push(...existingMatches.filter(record => record.id!==keepRecord.id).map(record => record.id));
        } else {
          const insertedResult = await sb.from("manufacturers").insert(payload).select("id").single();
          ensureOk(insertedResult);
          createdCount += 1;
          if(insertedResult.data?.id && importContacts.length) await replaceManufacturerContacts(insertedResult.data.id, importContacts);
        }
      }

      if(importMode==="replace"){
        for(const [key, records] of existingByKey.entries()){
          if(!incomingByKey.has(key)) manufacturerIdsToDelete.push(...records.map(record => record.id));
        }
      }

      await deleteManufacturersByIds(manufacturerIdsToDelete);
      setImportRows(null);
      await hydrate();
      if(importMode==="replace"){
        toast2("Import complete. Manufacturers synced to CSV.");
      }else if(createdCount){
        toast2(`Import complete. Batch ${formatImportBatchId(importBatchId)} is tracking ${createdCount} new compan${createdCount===1?"y":"ies"}.`);
      }else{
        toast2("Import complete. Existing companies were updated.");
      }
    }catch(err){
      toast2("Import error: "+err.message);
    }
    setSaving(false);
  };

  const list = tab==="manufacturer" ? filteredMfrs : filteredOthers;
  const importPreviewRows = (importRows || []).map(normalizeImportRow);
  const validImportRows = importPreviewRows.filter(row => isLikelyCompanyName(row.company));
  const importRowsByKey = buildMergedImportRowsByKey(importRows || []);
  const importUniqueRows = [...importRowsByKey.values()];
  const existingManufacturerByKey = new Map();
  mfrs.forEach(record => {
    const key = normalizeCompanyKey(record.company);
    if(!key) return;
    if(!existingManufacturerByKey.has(key)) existingManufacturerByKey.set(key, []);
    existingManufacturerByKey.get(key).push(record);
  });
  const importAddCount = importUniqueRows.filter(row => !existingManufacturerByKey.has(normalizeCompanyKey(row.company))).length;
  const importUpdateCount = importUniqueRows.length - importAddCount;
  const importDeleteCount = importMode==="replace"
    ? [...existingManufacturerByKey.entries()].reduce((sum,[key,records]) => sum + (!importRowsByKey.has(key) ? records.length : Math.max(0, records.length - 1)), 0)
    : 0;
  const importSkipCount = importPreviewRows.length - validImportRows.length;
  const visibleKeys = list.map(recordKey);
  const visibleKeySet = new Set(visibleKeys);
  const selectedVisibleRecords = list.filter(rec => selectedKeys.includes(recordKey(rec)));
  const allVisibleSelected = visibleKeys.length>0 && visibleKeys.every(key => selectedKeys.includes(key));
  const exportRecords = selectedVisibleRecords.length ? selectedVisibleRecords : list;
  const exportFileName = `${tab}${selectedVisibleRecords.length ? "-selected" : ""}.csv`;
  const syncDetailPanelHeight = useCallback(() => {
    const measure = element => {
      if(!element) return 0;
      const previous = element.style.height;
      const previousMinHeight = element.style.minHeight;
      element.style.height = "auto";
      element.style.minHeight = "0px";
      const height = element.scrollHeight;
      element.style.height = previous;
      element.style.minHeight = previousMinHeight;
      return height;
    };
    const nextHeight = Math.max(280, measure(notesBoxRef.current), measure(contactsBoxRef.current));
    setDetailPanelHeight(current => Math.abs(current - nextHeight) < 2 ? current : nextHeight);
  }, []);

  useEffect(()=>{
    setSelectedKeys(keys => {
      const next = keys.filter(key => visibleKeySet.has(key));
      return next.length===keys.length ? keys : next;
    });
  },[visibleKeys.join("|")]);

  useEffect(()=>{
    if(!["manufacturer","vendor"].includes(selected?.type)){
      setDetailPanelHeight(280);
      return;
    }
    const frame = window.requestAnimationFrame(syncDetailPanelHeight);
    return () => window.cancelAnimationFrame(frame);
  },[selected?.id, selected?.type, notesDraft, contactsDraft, syncDetailPanelHeight]);

  const toggleSelectRecord = rec => {
    const key = recordKey(rec);
    setSelectedKeys(keys => keys.includes(key) ? keys.filter(k=>k!==key) : [...keys,key]);
  };

  const toggleSelectAllVisible = () => {
    setSelectedKeys(keys => {
      if(allVisibleSelected) return keys.filter(key => !visibleKeySet.has(key));
      return [...keys.filter(key => !visibleKeySet.has(key)), ...visibleKeys];
    });
  };

  const bulkDeleteSelected = async () => {
    if(!selectedVisibleRecords.length) return;
    if(!window.confirm(`Delete ${selectedVisibleRecords.length} selected record${selectedVisibleRecords.length===1?"":"s"}?`)) return;
    await deleteRecords(selectedVisibleRecords);
  };
  const bulkSetSelectedIndustry = async industryValue => {
    const manufacturers = selectedVisibleRecords.filter(record => record.type==="manufacturer");
    if(!manufacturers.length) return false;
    const ids = manufacturers.map(record => record.id);
    const nextIndustry = industryValue===OTHER_INDUSTRY_LABEL ? "" : industryValue;
    setSaving(true);
    try{
      ensureOk(await sb.from("manufacturers").update({industry:nextIndustry}).in("id", ids));
      setMfrs(list => list.map(record => ids.includes(record.id) ? {...record, industry:nextIndustry} : record));
      setSelected(current => current && current.type==="manufacturer" && ids.includes(current.id) ? {...current, industry:nextIndustry} : current);
      toast2(`Updated ${manufacturers.length} ${manufacturers.length===1?"manufacturer":"manufacturers"} to ${industryValue}`);
      return true;
    }catch(err){
      toast2("Update error: "+err.message);
      return false;
    }
    finally{
      setSaving(false);
    }
  };

  if(loading) return <div style={{minHeight:"100vh",display:"grid",placeItems:"center"}}><div style={{display:"grid",gap:14,justifyItems:"center"}}><div className="spinner"/><div className="condensed" style={{letterSpacing:".1em",fontWeight:700,color:"#64748b"}}>LOADING</div></div></div>;

  const matchesTaskOwnerFilter = (task, ownerFilter) => ownerFilter==="All" || normalizeOwner(task.owner)===ownerFilter;
  const overdue = sortTasksByNearest(tasks.filter(t=>!t.done&&t.due_date&&t.due_date<=today()&&matchesTaskOwnerFilter(t, dueTaskOwnerFilter)));
  const upcoming = sortTasksByNearest(tasks.filter(t=>!t.done&&(!t.due_date||t.due_date>today())&&matchesTaskOwnerFilter(t, upcomingTaskOwnerFilter)));
  const taskSearchQuery = taskSearch.trim().toLowerCase();
  const filteredTaskList = sortTasksByNearest(tasks.filter(task => {
    if(task.done) return false;
    if(!matchesTaskOwnerFilter(task, allTasksOwnerFilter)) return false;
    if(!taskSearchQuery) return true;
    const haystack = [task.title, task.company, task.due_date, task.contact_type, task.owner].filter(Boolean).join(" ").toLowerCase();
    return haystack.includes(taskSearchQuery);
  }));
  const attachUnmatchedLegacyTasks = async () => {
    if(!unmatchedLegacyTasks.length) return;
    const preparedTasks = unmatchedLegacyTasks.map(task => normalizeLegacyTask(task, all, true));
    const existingTaskKeys = new Set(tasks.map(task => taskIdentityKey(task)));
    const pendingTasks = preparedTasks.filter(task => task.contact_id && !existingTaskKeys.has(taskIdentityKey(task)));
    if(!pendingTasks.length){
      const stillUnmatched = preparedTasks.filter(task => !task.contact_id);
      setUnmatchedLegacyTasks(stillUnmatched);
      if(stillUnmatched.length) localStorage.setItem(LEGACY_TASKS_KEY, JSON.stringify(stillUnmatched));
      else localStorage.removeItem(LEGACY_TASKS_KEY);
      return toast2(stillUnmatched.length ? "Those tasks still need clearer company matches." : "All unmatched tasks are already attached.");
    }
    setSaving(true);
    try{
      const companyByKey = new Map(all.map(record => [`${record.type}:${record.id}`, record.company || ""]));
      const insertedTasks = [];
      const insertedKeys = new Set();
      for(const task of pendingTasks){
        try{
          const inserted = await sb.from("activities").insert(taskActivityFromTask(task)).select("*").single();
          ensureOk(inserted);
          if(inserted.data){
            insertedTasks.push(taskRowFromActivity(inserted.data, companyByKey));
            insertedKeys.add(taskIdentityKey(task));
          }
        }catch(singleTaskErr){
          console.error("Attach legacy task failed", task, singleTaskErr);
        }
      }
      if(insertedTasks.length) setTasks(list => sortTasksByNearest([...insertedTasks, ...list]));
      const remainingTasks = preparedTasks.filter(task => {
        if(!task.contact_id) return true;
        return !insertedKeys.has(taskIdentityKey(task));
      });
      setUnmatchedLegacyTasks(remainingTasks);
      if(remainingTasks.length) localStorage.setItem(LEGACY_TASKS_KEY, JSON.stringify(remainingTasks));
      else localStorage.removeItem(LEGACY_TASKS_KEY);
      toast2(insertedTasks.length ? `Attached ${insertedTasks.length} task${insertedTasks.length===1?"":"s"}.` : "No tasks could be attached yet.");
    }catch(err){
      toast2("Task attach error: "+err.message);
    }
    setSaving(false);
  };
  const openWeeklyActivityLog = type => {
    setWeeklyActivityFilter(type || "All");
    setShowWeeklyActivityModal(true);
  };
  const pipe = mfrs.filter(m=>!["Closed Won","Closed Lost"].includes(m.stage)).length;
  const hot = mfrs.filter(m=>(m.tags||[]).includes("Hot")).length;
  const lostValue = lost.reduce((sum,r)=>sum+(r.value||0),0);
  const soFacilities = mfrs.filter(m=>m.has_so_facilities).length;
  const preferredVendors = vendors.filter(v=>(v.tags||[]).includes("Preferred")).length;
  const industryStats = INDUSTRY_OPTIONS.map(industry => ({ industry, count: mfrs.filter(m=>getIndustryBucket(m.industry)===industry).length }));
  const stageStats = STAGES.map(stage => ({ stage, count: mfrs.filter(m=>normalizeStage(m.stage)===stage).length }));
  const maxIndustryCount = Math.max(1, ...industryStats.map(item => item.count));
  const maxStageCount = Math.max(1, ...stageStats.map(item => item.count));
  const earliestWeeklyActivityDate = [...acts].map(activity => String(activity.date || "").trim()).filter(Boolean).sort()[0] || "";
  const maxWeeklyWeekOffset = earliestWeeklyActivityDate ? weeksBetweenDates(new Date(), new Date(`${earliestWeeklyActivityDate}T12:00:00`)) : 0;
  const effectiveWeeklyWeekOffset = Math.min(weeklyWeekOffset, maxWeeklyWeekOffset);
  const weeklyWeekOptions = Array.from({length:maxWeeklyWeekOffset + 1}, (_, offset) => {
    const start = weekStartDate(offset);
    const end = offset===0 ? today() : weekEndDate(offset);
    const label = offset===0
      ? `This week | ${start} to ${end}`
      : offset===1
        ? `Last week | ${start} to ${end}`
        : `${start} to ${end}`;
    return {offset,start,end,label};
  });
  const selectedWeeklyWeek = weeklyWeekOptions.find(option => option.offset===effectiveWeeklyWeekOffset) || weeklyWeekOptions[0] || {offset:0,start:weekStartDate(0),end:today(),label:`This week | ${weekStartDate(0)} to ${today()}`};
  const dashboardWeekStart = selectedWeeklyWeek.start;
  const dashboardWeekEnd = selectedWeeklyWeek.end;
  const weeklyActivities = [...acts]
    .filter(activity => {
      const activityDate = String(activity.date || "");
      return activityDate && activityDate >= dashboardWeekStart && activityDate <= dashboardWeekEnd;
    })
    .sort((left,right) => {
      const byDate = String(right.date || "").localeCompare(String(left.date || ""));
      if(byDate) return byDate;
      return String(right.id || "").localeCompare(String(left.id || ""));
    });
  const weeklyActivityStats = [{type:"All",count:weeklyActivities.length}, ...ACTIVITY_TYPES.map(type => ({type,count:weeklyActivities.filter(activity => activity.type===type).length}))];
  const filteredWeeklyActivities = weeklyActivityFilter==="All"
    ? weeklyActivities
    : weeklyActivities.filter(activity => activity.type===weeklyActivityFilter);
  const weeklyOwnerStats = PEOPLE.map(owner => ({owner,count:weeklyActivities.filter(activity => displayOwner(activity.created_by)===owner).length}));
  const stagePriority = {Negotiation:0,Proposal:1,Qualified:2,"Not Interested":3,Outreach:4,Prospect:5,Unqualified:6};
  const hotProspects = [...mfrs]
    .filter(m=>!["Closed Won","Closed Lost"].includes(m.stage))
    .sort((a,b)=>{
      const stageDiff = (stagePriority[a.stage] ?? 99) - (stagePriority[b.stage] ?? 99);
      if(stageDiff!==0) return stageDiff;
      return (a.lastContact || "9999-12-31").localeCompare(b.lastContact || "9999-12-31");
    })
    .slice(0,8);

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <header style={{height:58,padding:"0 28px",display:"flex",alignItems:"center",justifyContent:"space-between",background:"#fff",borderBottom:"3px solid #ef4444",boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
        <div className="condensed" style={{fontSize:22,fontWeight:800,letterSpacing:".04em"}}><span style={{color:"#ef4444"}}>ED</span> <span style={{color:"#1e3a8a"}}>INDUSTRIAL</span><span style={{fontSize:14,color:"#94a3b8",marginLeft:8,letterSpacing:".12em"}}>CRM</span></div>
        <div style={{display:"flex",gap:6}}>
          {[["dashboard","Dashboard"],["contacts","Contacts"],["leadfinder","Lead Finder"]].map(([value,label])=><button key={value} onClick={()=>setView(value)} style={{padding:"7px 16px",border:"none",borderRadius:3,background:view===value?"#1e3a8a":"transparent",color:view===value?"#fff":"#64748b",cursor:"pointer"}}>{label}</button>)}
        </div>
        <button onClick={()=>openForm(tab)} style={{padding:"8px 18px",border:"none",borderRadius:3,background:"#ef4444",color:"#fff",fontWeight:700,cursor:"pointer"}}>+ Add Company</button>
      </header>

      <main style={{flex:1,padding:28}}>
        <div style={{display:"grid",gap:12,marginBottom:18}}>
          <div style={{background:"#fff",border:"1px solid #d8e2ef",borderRadius:7,padding:"14px 16px",boxShadow:"0 2px 8px rgba(15,23,42,.04)"}}>
            <div className="mono" style={{fontSize:11,letterSpacing:".14em",color:"#6f84a6",textTransform:"uppercase",marginBottom:10}}>Ask CRM</div>
            <div style={{display:"grid",gridTemplateColumns:"140px minmax(0,1fr) auto auto",gap:8,alignItems:"center"}}>
              <select className="field" value={askAsker} onChange={e=>{ setAskAsker(e.target.value); setAskConversationQuery(""); setAskResult(null); setAskFeedbackText(""); }} style={{cursor:"pointer"}}>
                {PEOPLE.map(person => <option key={person} value={person}>{person}</option>)}
              </select>
              <input
                className="field"
                value={askQuery}
                onChange={e=>setAskQuery(e.target.value)}
                onKeyDown={e=>{ if(e.key==="Enter"){ e.preventDefault(); askCrm(); } }}
                placeholder="Ask CRM: Which prospects have overdue tasks?"
              />
              <button onClick={askCrm} style={{padding:"8px 16px",border:"none",borderRadius:4,background:"#1e3a8a",color:"#fff",cursor:"pointer",fontWeight:700,minWidth:88}}>{askLoading ? "..." : "Ask"}</button>
              <button onClick={clearAskCrm} style={{padding:"8px 14px",border:"1px solid #cbd5e1",borderRadius:4,background:"#fff",color:"#64748b",cursor:"pointer"}}>Reset</button>
            </div>
            <div style={{fontSize:12,color:"#8ea0bd",marginTop:8}}>Answers are based on the companies, contacts, notes, activities, and follow-ups already in this CRM, with the current asker set to {askAsker}.</div>
          </div>
          {askResult && (
            <div className="fade" style={{background:"#fff",border:"1px solid #d8e2ef",borderRadius:7,overflow:"hidden",boxShadow:"0 2px 8px rgba(15,23,42,.04)"}}>
              <div style={{padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,borderBottom:"1px solid #e8eef6",background:"#f8fbff"}}>
                <div>
                  <div className="condensed" style={{fontSize:20,fontWeight:800,color:"#172033"}}>{askResult.title}</div>
                  <div style={{fontSize:13,color:"#64748b",marginTop:4}}>{askResult.summary}</div>
                  {!!askResult.askedQuestion && <div className="mono" style={{fontSize:10,color:"#8ea0bd",marginTop:6,letterSpacing:".04em"}}>Asked: {askResult.askedQuestion}</div>}
                </div>
                {!!askResult.records?.length && <div className="mono" style={{fontSize:10,color:"#8ea0bd"}}>{askResult.records.length} quick link{askResult.records.length===1?"":"s"}</div>}
              </div>
              <div style={{padding:"14px 16px",display:"grid",gap:12}}>
                {!!askResult.answer && (
                  <div style={{background:"#f8fbff",border:"1px solid #cfe0ff",borderLeft:"4px solid #1e3a8a",borderRadius:8,padding:"14px 16px",display:"grid",gap:8}}>
                    <div className="mono" style={{fontSize:10,color:"#6f84a6",letterSpacing:".12em",textTransform:"uppercase"}}>Best Answer</div>
                    <div style={{fontSize:18,color:"#172033",fontWeight:800,lineHeight:1.5,whiteSpace:"pre-wrap"}}>
                      {askResult.answer}
                    </div>
                  </div>
                )}
                {!!askResult.lines?.length && <div style={{display:"grid",gap:8}}>
                  {askResult.lines.map((line, index)=><div key={`${askResult.title}-${index}`} style={{fontSize:13,color:"#334155",lineHeight:1.6,whiteSpace:"pre-wrap",wordBreak:"break-word",background:index===0&&askResult.answer?"#fff":"transparent",padding:index===0&&askResult.answer?"0":"0"}}>{line}</div>)}
                </div>}
                {!!askResult.records?.length && <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {askResult.records.map(record => <button key={recordKey(record)} onClick={()=>openAskRecord(record)} style={{padding:"7px 12px",border:"1px solid #1e3a8a",borderRadius:999,background:"#eff6ff",color:"#1e3a8a",cursor:"pointer",fontSize:12,fontWeight:700}}>{record.company}</button>)}
                </div>}
                <div style={{display:"grid",gap:8,paddingTop:4,borderTop:"1px solid #eef3f9"}}>
                  <div className="mono" style={{fontSize:10,color:"#8ea0bd",letterSpacing:".12em",textTransform:"uppercase"}}>Reply To Ask CRM</div>
                  <div className="mono" style={{fontSize:10,color:"#94a3b8"}}>Current asker: {askAsker}</div>
                  <textarea
                    className="fieldbox"
                    style={{minHeight:76}}
                    value={askFeedbackText}
                    onChange={e=>setAskFeedbackText(e.target.value)}
                    onKeyDown={e=>{
                      if(e.key==="Enter" && !e.shiftKey){
                        e.preventDefault();
                        if(askFeedbackText.trim()) sendAskReply();
                      }
                    }}
                    placeholder="Ask a follow-up question or send a reply..."
                  />
                  <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
                    <button onClick={()=>setAskFeedbackText("")} style={{padding:"8px 12px",border:"1px solid #cbd5e1",borderRadius:4,background:"#fff",color:"#64748b",cursor:"pointer"}}>Clear Reply</button>
                    <button onClick={sendAskReply} disabled={!askFeedbackText.trim()} style={{padding:"8px 14px",border:"none",borderRadius:4,background:askFeedbackText.trim()?"#16a34a":"#cbd5e1",color:"#fff",cursor:askFeedbackText.trim()?"pointer":"not-allowed",fontWeight:700}}>Send Reply</button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
        {view==="dashboard" && (
          <div className="fade" style={{display:"grid",gap:20}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,minmax(0,1fr))",gap:16}}>
              {[
                ["Manufacturers",mfrs.length,"","#1e3a8a","◌"],
                ["In Pipeline",pipe,"","#ef4444","◈"],
                ["Vendors",vendors.length,preferredVendors+" preferred","#1d4ed8","◉"],
                ["Lost Value","$"+(lostValue/1000).toFixed(0)+"k",lost.length+" lost contacts","#94a3b8","✕"],
              ].map(([label,value,sub,color,icon])=>(
                <div key={label} style={{background:"#fff",border:"1px solid #d8e2ef",borderTop:"3px solid "+color,borderRadius:7,padding:"18px 20px",boxShadow:"0 2px 8px rgba(15,23,42,.04)"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                    <span style={{color,fontSize:11}}>{icon}</span>
                    <div className="mono" style={{fontSize:10,letterSpacing:".14em",color:"#7f92b0",textTransform:"uppercase"}}>{label}</div>
                  </div>
                  <div className="condensed" style={{fontSize:34,fontWeight:800,color:"#18233a",lineHeight:1,marginBottom:8}}>{value}</div>
                  <div style={{fontSize:12,color:"#8fa0b8",minHeight:18}}>{sub}</div>
                </div>
              ))}
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1.4fr 1fr",gap:20,alignItems:"stretch"}}>
              <section style={{background:"#fff",border:"1px solid #d8e2ef",borderRadius:7,overflow:"hidden",boxShadow:"0 2px 8px rgba(15,23,42,.04)"}}>
                <div className="mono" style={{padding:"14px 18px",fontSize:11,letterSpacing:".16em",color:"#6f84a6",textTransform:"uppercase",borderBottom:"1px solid #d8e2ef",background:"#f8fbff"}}>By Industry</div>
                <div style={{padding:"16px 18px",display:"grid",gap:10}}>
                  {industryStats.map(item=>(
                    <div key={item.industry} onClick={()=>{setView("contacts"); setTab("manufacturer"); setIndF(item.industry); setStageF("All");}} style={{cursor:"pointer"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                        <div style={{display:"flex",alignItems:"center",gap:7,color:IND_COLORS[item.industry]||"#64748b",fontSize:12,fontWeight:700,textTransform:"uppercase"}}>
                          <span>{IND_ICONS[item.industry]||"•"}</span>
                          <span className="condensed" style={{letterSpacing:".03em"}}>{item.industry}</span>
                        </div>
                        <span className="mono" style={{fontSize:11,color:"#8ea0bd"}}>{item.count}</span>
                      </div>
                      <div style={{height:4,borderRadius:999,background:"#eef3f9"}}>
                        <div style={{height:"100%",width:(item.count/maxIndustryCount*100)+"%",background:IND_COLORS[item.industry]||"#64748b",borderRadius:999}} />
                      </div>
                    </div>
                  ))}
                </div>
              </section>

              <section style={{background:"#fff",border:"1px solid #d8e2ef",borderRadius:7,overflow:"hidden",boxShadow:"0 2px 8px rgba(15,23,42,.04)"}}>
                <div className="mono" style={{padding:"14px 18px",fontSize:11,letterSpacing:".16em",color:"#6f84a6",textTransform:"uppercase",borderBottom:"1px solid #d8e2ef",background:"#f8fbff"}}>Pipeline by Stage</div>
                <div style={{padding:"16px 18px",display:"grid",gap:10}}>
                  {stageStats.map(item=>(
                    <div key={item.stage} onClick={()=>{setView("contacts"); setTab("manufacturer"); setStageF(item.stage); setIndF("All");}} style={{cursor:"pointer"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                        <span className="condensed" style={{fontSize:12,fontWeight:700,letterSpacing:".04em",color:STAGE_COLORS[item.stage]||"#64748b",textTransform:"uppercase"}}>{item.stage}</span>
                        <span className="mono" style={{fontSize:11,color:"#8ea0bd"}}>{item.count}</span>
                      </div>
                      <div style={{height:4,borderRadius:999,background:"#eef3f9"}}>
                        <div style={{height:"100%",width:(item.count/maxStageCount*100)+"%",background:STAGE_COLORS[item.stage]||"#64748b",borderRadius:999}} />
                      </div>
                    </div>
                  ))}
                </div>
              </section>

              <section style={{background:"#fff",border:"1px solid #d8e2ef",borderRadius:7,overflow:"hidden",boxShadow:"0 2px 8px rgba(15,23,42,.04)"}}>
                <div style={{padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #d8e2ef",background:"#f8fbff",gap:12}}>

                  {selected.type==="vendor" && <>
                    <select className="field mono" style={{width:"auto",padding:"5px 10px",height:30,fontSize:12,background:"#f8fbff"}} value={selected.stage||"Prospect"} onChange={e=>{ const v=e.target.value; setSelected(cur=>({...cur,stage:v})); saveVendorField("stage",v); }}>{STAGES.map(s=><option key={s}>{s}</option>)}</select>
                    <input className="field mono" style={{width:180,padding:"5px 10px",height:30,fontSize:12,background:"#fffaf5",color:"#f97316"}} value={selected.industry||""} placeholder={OTHER_INDUSTRY_LABEL} onChange={e=>setSelected(cur=>({...cur,industry:e.target.value}))} onBlur={e=>saveVendorField("industry", e.target.value)} />

                              <select className="field mono" value={editingTaskDraft.owner} onChange={e=>setEditingTaskDraft(cur=>({...cur,owner:normalizeOwner(e.target.value)}))} onKeyDown={e=>{ if(e.key==="Escape"){ setEditingTaskId(null); setEditingTaskDraft(createEmptyTaskEditDraft()); } }}>

                            </div>
                          : <div>
                              <div style={{fontSize:13,textDecoration:t.done?"line-through":"none",color:t.done?"#94a3b8":"#0f172a",cursor:"text"}}>{t.title}</div>

                                <OwnerTag owner={t.owner} />

                              </div>
                            </div>}
                      </div>
                      <button onClick={e=>{ e.stopPropagation(); deleteTask(t.id); }} style={{border:"none",background:"transparent",color:"#cbd5e1",fontSize:16,cursor:"pointer"}}>×</button>
                    </div>
                  ))}

                    <select className="field mono" value={normalizeOwner(newAct.created_by)} onChange={e=>{ const next = {...newAct,created_by:normalizeOwner(e.target.value)}; setNewAct(next); syncActivityDraft(selected,next); }}>
                      {PEOPLE.map(person=><option key={person}>{person}</option>)}
                    </select>
                    <button onClick={logActivity} style={{padding:"8px 14px",border:"none",borderRadius:4,background:"#ef4444",color:"#fff",cursor:"pointer",fontWeight:800,fontSize:12,letterSpacing:".05em"}}>LOG</button>

                          </div>

                            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:4}}><span className="condensed" style={{fontSize:12,fontWeight:700,color:"#1e3a8a",textTransform:"uppercase"}}>{a.type}</span><span className="mono" style={{fontSize:10,color:"#94a3b8"}}>{a.date}</span><OwnerTag owner={a.created_by} /></div>
                            <LinkifiedText text={a.note} style={{fontSize:13,color:"#475569",lineHeight:1.6}} />
                          </div>}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>

                  ["City", leadFinderSelected.city || "-"],

              <div style={{display:"grid",gridTemplateColumns:"1.3fr .9fr",gap:18,alignItems:"start"}}>
                <div style={{background:"#fbfcfe",border:"1px solid #d7dfeb",borderRadius:6,padding:14}}>
                  <div className="mono" style={{fontSize:10,color:"#8ea0bd",letterSpacing:".12em",marginBottom:8}}>NOTES</div>
                  <LinkifiedText text={leadFinderSelected.notes || "-"} style={{fontSize:13,color:"#475569",lineHeight:1.7,whiteSpace:"pre-wrap",wordBreak:"break-word"}} />
                </div>

                    <div className="mono" style={{fontSize:10,color:"#8ea0bd",letterSpacing:".12em",marginBottom:8}}>CONTACTS</div>
